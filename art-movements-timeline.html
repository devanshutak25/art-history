];

const EC={
"Prehistoric & Ancient Non-Western":{accent:"#B87333",text:"#E0CAA8"},
"Classical Mediterranean & Asian":{accent:"#C9A86C",text:"#E8D5B5"},
"Medieval European":{accent:"#8B6DAF",text:"#D4C5E2"},
"Renaissance & Early Modern":{accent:"#4CAF7D",text:"#B8DFC9"},
"18th–19th Century":{accent:"#C17F24",text:"#E2CCA0"},
"Early 20th Century Avant-Garde":{accent:"#D94F4F",text:"#E8B8B8"},
"Mid-20th Century":{accent:"#3D8FD6",text:"#B0CDE8"},
"Late 20th Century":{accent:"#A8B52D",text:"#D6DC9E"},
"Contemporary (21st Century)":{accent:"#29B6C2",text:"#A8DDE2"}
};
let ex=new Set(),se=null,q="";
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function hi(t,q){if(!q)return esc(t);return esc(t).replace(new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi"),"<mark>$1</mark>")}
function an(a){return typeof a==="string"?a:a.n}
function render(){
const ql=q.toLowerCase();
const f=D.filter(e=>!se||e.era===se).map(e=>({...e,items:e.items.filter(i=>{if(!ql)return true;return i.name.toLowerCase().includes(ql)||i.about.toLowerCase().includes(ql)||i.origin.toLowerCase().includes(ql)||i.artists.some(a=>an(a).toLowerCase().includes(ql))})})).filter(e=>e.items.length>0);
const tot=f.reduce((s,e)=>s+e.items.length,0);
document.getElementById("meta").textContent=tot+" movements · ~40,000 BCE – present";
const fl=document.getElementById("filters");fl.innerHTML="";
const ab=document.createElement("button");ab.className="filter-btn"+(!se?" active":"");ab.textContent="All";ab.onclick=()=>{se=null;render()};fl.appendChild(ab);
D.forEach(e=>{const b=document.createElement("button");b.className="filter-btn"+(se===e.era?" active":"");b.textContent=e.era;const c=EC[e.era];if(se===e.era&&c){b.style.background=c.accent+"25";b.style.color=c.accent;b.style.borderColor=c.accent+"40"}b.onclick=()=>{se=se===e.era?null:e.era;render()};fl.appendChild(b)});
const tl=document.getElementById("timeline");
if(!f.length){tl.innerHTML='<p class="empty">No movements match.</p>';return}
let h="";
f.forEach(era=>{
const c=EC[era.era]||{accent:"#888",text:"#CCC"};
h+=`<div class="era"><div class="era-head" style="border-bottom:1px solid ${c.accent}20"><div class="era-dot" style="background:${c.accent}"></div><h2 style="color:${c.accent}">${esc(era.era)}</h2><span class="count">${era.items.length}</span></div>`;
era.items.forEach(it=>{
const k=era.era+"|"+it.name;const isE=ex.has(k);
const nm=it.wiki?`<a class="xlink" href="${it.wiki}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:${c.accent}">${hi(it.name,q)}</a>`:`<span style="color:${c.accent}">${hi(it.name,q)}</span>`;
let rl="";const al=[];if(it.wiki)al.push({l:"Wikipedia",u:it.wiki});if(it.links)it.links.forEach(x=>al.push(x));
if(al.length){rl=`<div class="section"><span class="label" style="color:${c.accent}">Resources</span><div class="res-links">${al.map(x=>`<a class="res-link" href="${x.u}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:${c.text};border:1px solid ${c.accent}25">${esc(x.l)} ↗</a>`).join("")}</div></div>`}
const tg=it.artists.map(a=>{const nm2=an(a);const u=typeof a==="object"&&a.u?a.u:null;const inn=hi(nm2,q);const ct=u?`<a class="xlink" href="${u}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${inn}</a>`:inn;return`<span class="tag" style="background:${c.accent}18;border:1px solid ${c.accent}30;color:${c.text}">${ct}</span>`}).join("");
h+=`<div class="card${isE?" expanded":""}" data-key="${esc(k)}" style="border-left-color:${c.accent};${isE?"background:"+c.accent+"10":""}"><div class="card-head"><h3>${nm}</h3><span class="period" style="color:${c.text}">${esc(it.period)}</span></div><div class="card-body" style="color:${c.text}"><div class="section"><span class="label" style="color:${c.accent}">Origin</span><p>${hi(it.origin,q)}</p></div><div class="section"><span class="label" style="color:${c.accent}">Core Ideas</span><p>${hi(it.about,q)}</p></div><div class="section"><span class="label" style="color:${c.accent}">Key Figures</span><div class="tags">${tg}</div></div>${rl}</div></div>`;
});h+="</div>"});
tl.innerHTML=h;
tl.querySelectorAll(".card").forEach(el=>{el.addEventListener("click",()=>{const k=el.getAttribute("data-key");if(ex.has(k))ex.delete(k);else ex.add(k);render()})});
}
function expandAll(){D.forEach(e=>e.items.forEach(i=>ex.add(e.era+"|"+i.name)));render()}
function collapseAll(){ex.clear();render()}
document.getElementById("search").addEventListener("input",e=>{q=e.target.value;render()});
render();
</script>
</body>
</html>
