<style>
:root{
--bg:#0A0A0A;--fg:#E0E0E0;--fg2:#F0F0F0;--dim:#8A8A8A;--dim2:#999;--border:#1A1A1A;
--card-bg:#141414;--card-hover:rgba(255,255,255,0.02);--header-bg:#0A0A0A;
--search-bg:#141414;--search-border:#252525;--filter-border:#2A2A2A;
--mark-bg:rgba(255,200,50,0.25);--tooltip-bg:rgba(20,20,20,1.0);--tooltip-fg:#EEE;
--tray-bg:#111;--tray-border:#333;
--scroll-thumb:#333;--scroll-track:transparent;
}
[data-theme="light"]{
--bg:#F7F3ED;--fg:#2A2420;--fg2:#1A1610;--dim:#7A7068;--dim2:#5A524A;--border:#DDD5C8;
--card-bg:#FFFDF8;--card-hover:rgba(0,0,0,0.04);--header-bg:#F7F3ED;
--search-bg:#FFFDF8;--search-border:#C8BFA8;--filter-border:#C8BFA8;
--mark-bg:rgba(200,160,50,0.25);--tooltip-bg:rgba(50,42,32,1.0);--tooltip-fg:#F0EBE2;
--tray-bg:#FFFDF8;--tray-border:#C8BFA8;
--scroll-thumb:#B8AD98;--scroll-track:transparent;
}
::selection{background:rgba(201,168,108,0.35);color:inherit}
/* Scrollbar theming */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--scroll-track)}
::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--scroll-thumb-hover,#555)}
[data-theme="light"] ::-webkit-scrollbar-thumb:hover{background:#9A8E78}
*{scrollbar-width:thin;scrollbar-color:var(--scroll-thumb) var(--scroll-track)}
/* Animation tokens */
:root{--ease-out-quart:cubic-bezier(0.25,1,0.5,1);--ease-out-expo:cubic-bezier(0.16,1,0.3,1)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:'IBM Plex Sans',system-ui,sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;transition:background .4s var(--ease-out-quart),color .3s ease}
.header{position:relative;z-index:100;background:var(--header-bg);padding:24px 24px 10px;border-bottom:1px solid var(--border);transition:background .3s;box-shadow:0 1px 8px rgba(0,0,0,0.15);flex-shrink:0}
[data-theme="light"] .header{box-shadow:0 1px 8px rgba(90,60,20,0.12)}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
/* Page load choreography */
@keyframes revealUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.header h1,.header .meta,.search,.view-toggles,.filter-toggle,.controls,nav[aria-label="Filters"]{
  animation:revealUp .5s var(--ease-out-quart) backwards}
.header h1{animation-delay:0ms}
.header .meta{animation-delay:60ms}
.search{animation-delay:120ms}
.view-toggles{animation-delay:160ms}
nav[aria-label="Filters"]{animation-delay:200ms}
.controls{animation-delay:220ms}
.filter-toggle{animation-delay:200ms}
.header h1{font-family:'Instrument Serif',Georgia,serif;font-size:28px;font-weight:400;color:var(--fg2);letter-spacing:-0.5px;margin-bottom:3px}
.header .meta{font-size:13px;font-family:'IBM Plex Mono',monospace;color:var(--dim);margin-bottom:10px}
.search{width:100%;padding:10px 14px;background:var(--search-bg);border:1px solid var(--search-border);border-radius:6px;color:var(--fg);font-size:14px;font-family:'IBM Plex Sans',system-ui,sans-serif;outline:none;margin-bottom:8px;transition:border-color .15s,background .3s}
.search:focus{border-color:#555;box-shadow:0 0 0 3px rgba(255,255,255,0.04)}.search::placeholder{color:var(--dim)}
[data-theme="light"] .search:focus{border-color:#9A8E78;box-shadow:0 0 0 3px rgba(90,60,20,0.12)}
.view-toggles{display:flex;gap:6px;margin-bottom:8px}
.view-btn{padding:5px 12px;font-size:12px;font-family:'IBM Plex Mono',monospace;background:transparent;color:var(--dim2);border:1px solid var(--filter-border);border-radius:4px;cursor:pointer;transition:border-color .15s,color .15s,background .15s}
.view-btn:hover{border-color:#666;color:var(--fg)}.view-btn:active{transform:scale(0.97)}
.view-btn.active{background:var(--fg2);color:var(--bg);border-color:var(--fg2)}
.filters{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.filter-btn{padding:4px 10px;font-size:11px;font-family:'IBM Plex Mono',monospace;background:transparent;color:var(--dim2);border:1px solid var(--filter-border);border-radius:4px;cursor:pointer;transition:border-color .15s,color .15s,background .15s;white-space:nowrap}
.filter-btn:hover{border-color:#666;color:var(--fg)}.filter-btn:active{transform:scale(0.97)}
.filter-btn.active{background:var(--fg2);color:var(--bg);border-color:var(--bg);border-style:dashed}
.tag-filters{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tag-fbtn{padding:3px 8px;font-size:10px;font-family:'IBM Plex Mono',monospace;background:transparent;color:var(--dim);border:1px solid var(--filter-border);border-radius:3px;cursor:pointer;transition:border-color .15s,color .15s,background .15s}
.tag-fbtn:hover{border-color:#666;color:var(--fg)}.tag-fbtn:active{transform:scale(0.97)}
.tag-fbtn.active{background:var(--dim2);color:var(--bg);border-color:var(--bg);border-style:dashed}
.controls{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.ctrl-btn{background:none;border:none;color:var(--dim);font-size:12px;font-family:'IBM Plex Mono',monospace;cursor:pointer;padding:2px 4px;transition:color .15s}
.ctrl-btn:hover{color:var(--fg)}.ctrl-btn:active{opacity:.7}
.ctrl-btn.active-mode{color:#FFF;background:#D94F4F;border-radius:3px;padding:2px 8px}
.timeline-bar{width:28px;flex-shrink:0;display:flex;flex-direction:column;cursor:pointer;position:relative;border-left:1px solid var(--border);border-right:1px solid var(--border)}
.tbar-label{display:none}
.tbar-seg{width:100%;position:relative;transition:opacity .15s,filter .15s;min-height:2px;border-bottom:1px solid rgba(0,0,0,0.15)}
.tbar-seg:last-child{border-bottom:none}
.tbar-seg:hover{filter:brightness(1.2)}
.tbar-tooltip{position:absolute;left:110%;top:50%;background:var(--tooltip-bg);color:var(--tooltip-fg);padding:6px 12px;border-radius:6px;font-size:11px;font-family:'IBM Plex Mono',monospace;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s var(--ease-out-quart),transform .2s var(--ease-out-quart);transform:translateY(-50%) translateX(-4px);z-index:10;box-shadow:0 4px 16px rgba(0,0,0,0.3);border-left:3px solid var(--tbar-accent,#888);line-height:1.5}
.tbar-tooltip .tbar-tip-era{font-weight:500;color:var(--tbar-accent,#888)}.tbar-tooltip .tbar-tip-detail{font-size:10px;opacity:.7}
.tbar-seg:hover .tbar-tooltip{opacity:1;transform:translateY(-50%) translateX(0)}
.tbar-seg.selected{z-index:1}
.tbar-seg.selected::after{content:"";position:absolute;inset:0;border:2px dashed rgba(255,255,255,0.7);border-radius:2px;pointer-events:none}
[data-theme="light"] .tbar-seg.selected::after{border-color:rgba(0,0,0,0.5)}
.timeline{padding:18px 24px 60px}
.era{margin-bottom:30px;content-visibility:auto;contain-intrinsic-size:auto 500px;opacity:0;transform:translateY(20px);transition:opacity .5s var(--ease-out-quart),transform .5s var(--ease-out-quart)}
.era.visible{opacity:1;transform:translateY(0)}
.era-head{display:flex;align-items:center;gap:12px;padding-bottom:8px;margin-bottom:12px}
.era-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:box-shadow .2s}
.era-head:hover .era-dot{box-shadow:0 0 8px 2px currentColor}
.era-head h2{font-family:'Instrument Serif',Georgia,serif;font-size:18px;font-weight:400}
.era-head .count{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--dim)}
.card{border-left:3px solid transparent;padding:14px 18px;margin-bottom:6px;border-radius:0 8px 8px 0;cursor:pointer;transition:background .2s ease,box-shadow .2s ease,border-left-width .15s ease,transform .15s ease}
.card:hover{background:var(--card-hover);border-left-width:5px;transform:translateX(2px)}
.card:active{opacity:.9;transform:translateX(1px)}
.card.focused{box-shadow:inset 0 0 0 1px rgba(255,255,255,0.2)}
[data-theme="light"] .card.focused{box-shadow:inset 0 0 0 1px rgba(0,0,0,0.15)}
.card-head{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
.card-head h3{font-family:'Instrument Serif',Georgia,serif;font-size:16px;font-weight:400}
.card-head .period{font-size:12px;font-family:'IBM Plex Mono',monospace;opacity:.55;white-space:nowrap;flex-shrink:0}
.card-preview{font-size:12px;opacity:0.45;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;line-height:1.4;pointer-events:none}
.card.expanded .card-preview{display:none}
.card-body{margin-top:0;font-size:13.5px;line-height:1.65;opacity:0;max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(0.4,0,0.2,1),opacity .25s ease,margin-top .25s ease}
.card.expanded .card-body{opacity:.88;max-height:2000px;margin-top:14px;overflow:visible}
.card-body .label{display:inline-block;font-size:10px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px;opacity:.75}
.card-body .section{margin-bottom:12px;opacity:0;transform:translateY(6px);transition:opacity .3s var(--ease-out-quart),transform .3s var(--ease-out-quart)}
.card.expanded .card-body .section{opacity:1;transform:translateY(0)}
.card.expanded .card-body .section:nth-child(1){transition-delay:50ms}
.card.expanded .card-body .section:nth-child(2){transition-delay:100ms}
.card.expanded .card-body .section:nth-child(3){transition-delay:140ms}
.card.expanded .card-body .section:nth-child(4){transition-delay:170ms}
.card.expanded .card-body .section:nth-child(5){transition-delay:200ms}
.card.expanded .card-body .section:nth-child(n+6){transition-delay:220ms}
.card-body .tags{display:flex;flex-wrap:wrap;gap:6px}
.card-body .tag{font-size:12px;padding:3px 9px;border-radius:4px;font-family:'IBM Plex Sans',system-ui,sans-serif;transition:transform .2s var(--ease-out-quart),box-shadow .2s ease}
.card-body .tag:hover{transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,0.2)}
a.xlink{color:inherit;text-decoration:none;border-bottom:1px dotted currentColor;opacity:.85;transition:opacity .15s}
a.xlink:hover{opacity:1}
.tag a.xlink{border-bottom:none}.tag a.xlink:hover{text-decoration:underline}
.res-links{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.res-link{font-size:11px;padding:2px 8px;border-radius:3px;font-family:'IBM Plex Mono',monospace;text-decoration:none;transition:opacity .15s,background .15s,transform .15s ease;opacity:.7;display:inline-flex;align-items:center;gap:4px}
.res-link:hover{opacity:1;background:rgba(255,255,255,0.05);transform:translateX(2px)}
[data-theme="light"] .res-link:hover{background:rgba(0,0,0,0.04)}
/* Light mode contrast fixes */
[data-theme="light"] .card-head .period{opacity:.7}
[data-theme="light"] .card-preview{opacity:.6}
[data-theme="light"] .card-body .label{opacity:.85}
[data-theme="light"] .res-link{opacity:.8}
[data-theme="light"] .artwork-list li::before{opacity:.55}
[data-theme="light"] .artwork-meta{opacity:.75}
[data-theme="light"] .geo-label{opacity:.8}
[data-theme="light"] .hx-text{opacity:.85}
[data-theme="light"] .med-tag{opacity:.8}
[data-theme="light"] .md-era-label{opacity:.75}
[data-theme="light"] .md-item-period{opacity:.65}
[data-theme="light"] .md-detail-header .period{opacity:.7}
[data-theme="light"] .empty-hint{opacity:.65}
[data-theme="light"] .onboard-hint .dismiss{opacity:.75}
[data-theme="light"] .inf-link{opacity:.9}
[data-theme="light"] .concept-pill{opacity:.95}
[data-theme="light"] .filter-btn{color:var(--dim2);border-color:#B8AD98}
[data-theme="light"] .filter-btn.active{background:#3A3228;color:#F7F3ED;border-color:#F7F3ED;border-style:dashed}
[data-theme="light"] .tag-fbtn{color:var(--dim2);border-color:#C2B8A5}
[data-theme="light"] .tag-fbtn.active{background:#5A524A;color:#F7F3ED;border-color:#F7F3ED;border-style:dashed}
[data-theme="light"] .view-btn{color:var(--dim2);border-color:#B8AD98}
[data-theme="light"] .view-btn.active{background:#3A3228;color:#F7F3ED;border-color:#3A3228}
[data-theme="light"] .ctrl-btn{color:var(--dim2)}
[data-theme="light"] .nav-btn{border-color:#B8AD98}
[data-theme="light"] .md-back-btn{border-color:#B8AD98;color:var(--dim2)}
[data-theme="light"] .filter-btn:hover,[data-theme="light"] .tag-fbtn:hover,[data-theme="light"] .view-btn:hover,[data-theme="light"] .nav-btn:hover,[data-theme="light"] .md-back-btn:hover{border-color:#8A7E68;color:var(--fg)}
[data-theme="light"] .filter-toggle:hover{border-color:#8A7E68;color:var(--fg)}
[data-theme="light"] .filter-btn.active:hover,[data-theme="light"] .tag-fbtn.active:hover,[data-theme="light"] .view-btn.active:hover{color:#F7F3ED;border-color:#F7F3ED}
.md-detail-body{opacity:.88}
[data-theme="light"] .md-detail-body{opacity:.95}
[data-theme="light"] .card.expanded .card-body{opacity:.95}
.empty{text-align:center;color:var(--dim);margin-top:60px;padding:40px 20px}
.empty-icon{font-size:32px;opacity:.3;margin-bottom:12px;display:block;animation:gentleFloat 3s ease-in-out infinite}
@keyframes gentleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.empty-text{font-style:italic;font-size:14px;margin-bottom:8px}
.empty-hint{font-size:12px;font-family:'IBM Plex Mono',monospace;opacity:.5}
mark{background:var(--mark-bg);color:inherit;border-radius:2px;padding:0 1px}
.artwork-list{margin:4px 0;padding-left:16px;list-style:none}
.artwork-list li{font-size:12.5px;line-height:1.6;position:relative;padding-left:12px}
.artwork-list li::before{content:"";position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.4}
.artwork-title{font-style:italic}
.artwork-meta{font-family:'IBM Plex Mono',monospace;font-size:11px;opacity:.6}
.inf-label{opacity:.65}
[data-theme="light"] .inf-label{opacity:.8}
.inf-link{cursor:pointer;text-decoration:none;opacity:.85;transition:opacity .15s;position:relative;display:inline}
.inf-link::after{content:"";position:absolute;bottom:-1px;left:0;width:0;height:1px;background:currentColor;transition:width .25s var(--ease-out-quart)}
.inf-link:hover{opacity:1}.inf-link:hover::after{width:100%}
.concept-pill{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-family:'IBM Plex Mono',monospace;cursor:pointer;position:relative;margin:2px;transition:background .15s}
.concept-pill:hover{opacity:.9}
.concept-def{display:none;position:absolute;bottom:110%;left:0;min-width:200px;max-width:300px;background:var(--tooltip-bg);color:var(--tooltip-fg);padding:8px 12px;border-radius:6px;font-size:11px;line-height:1.5;z-index:50;pointer-events:none;font-family:'IBM Plex Sans',system-ui,sans-serif;box-shadow:0 4px 16px rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.06)}
.concept-pill:hover .concept-def,.concept-pill:focus .concept-def,.concept-pill.open .concept-def{display:block}
.concept-pill:focus{outline:2px solid currentColor;outline-offset:1px}
.hx-text{font-style:italic;opacity:.8;font-size:12.5px}
.geo-label{font-size:12px;font-family:'IBM Plex Mono',monospace;opacity:.65}
.nav-btns{display:flex;gap:8px;margin-top:8px}
.nav-btn{padding:3px 10px;font-size:11px;font-family:'IBM Plex Mono',monospace;background:transparent;color:var(--fg);border:1px solid var(--filter-border);border-radius:3px;cursor:pointer;transition:border-color .15s,background .15s}
.nav-btn:hover{border-color:#666;background:rgba(255,255,255,0.05)}
.nav-btn:active{transform:scale(0.97)}
.wiki-thumb-wrap{float:right;margin:0 0 8px 16px;clear:right}
.wiki-thumb-wrap:empty{display:none}
.wiki-thumb{max-width:240px;max-height:200px;border-radius:6px;opacity:0;animation:fadeIn .4s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:.9;transform:translateY(0)}}
.medium-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.med-tag{font-size:10px;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;opacity:.7}
/* Back to top */
.btt{position:fixed;bottom:24px;right:24px;width:40px;height:40px;border-radius:50%;background:var(--tooltip-bg);color:var(--tooltip-fg);border:1px solid var(--tray-border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;z-index:200;opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .25s ease,transform .25s ease}
.btt.show{opacity:1;pointer-events:auto;transform:translateY(0)}
.btt:hover{opacity:.8}.btt:active{transform:scale(0.92)}
/* Era indicator */
.era-ind{position:fixed;top:auto;bottom:70px;right:24px;background:var(--tooltip-bg);color:var(--tooltip-fg);padding:4px 10px;border-radius:4px;font-size:11px;font-family:'IBM Plex Mono',monospace;z-index:200;pointer-events:none;opacity:0;transform:translateX(4px);transition:opacity .2s ease,transform .2s ease;max-width:200px;text-align:right}
.era-ind.show{opacity:1;transform:translateX(0)}
/* Compare tray */
.compare-tray{position:fixed;bottom:0;left:0;right:0;background:var(--tray-bg);border-top:2px solid var(--tray-border);z-index:150;padding:12px 24px;transform:translateY(100%);opacity:0;pointer-events:none;transition:transform .3s cubic-bezier(0.4,0,0.2,1),opacity .2s ease,background .3s}
.compare-tray.show{transform:translateY(0);opacity:1;pointer-events:auto}
.compare-tray h2{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;font-weight:400}
.compare-grid{display:grid;gap:12px;font-size:12px}
.compare-col{min-width:0}
.compare-col h3{font-family:'Instrument Serif',Georgia,serif;font-size:15px;font-weight:400;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.compare-row{margin-bottom:4px}
.compare-row .clbl{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;color:var(--dim);letter-spacing:.5px}
.compare-row .cval{font-size:11.5px;line-height:1.5}
.compare-close{position:absolute;top:8px;right:16px;background:none;border:none;color:var(--dim);font-size:16px;cursor:pointer}
.compare-tray .remove-btn{background:none;border:none;color:#D94F4F;font-size:10px;cursor:pointer;font-family:'IBM Plex Mono',monospace;margin-left:4px}
/* Graph view */
#graph-view{width:100%;height:100%;position:relative}
#graph-canvas{width:100%;height:100%;cursor:grab}
#graph-canvas:active{cursor:grabbing}
.graph-tooltip{position:absolute;background:var(--tooltip-bg);color:var(--tooltip-fg);padding:6px 12px;border-radius:6px;font-size:12px;font-family:'IBM Plex Mono',monospace;pointer-events:none;display:none;z-index:20;box-shadow:0 4px 16px rgba(0,0,0,0.3);border-left:3px solid var(--tip-accent,#888);line-height:1.5}
/* Map view */
#map-view{width:100%;height:100%;position:relative}
#map-svg{width:100%;height:100%;cursor:grab}
#map-svg:active{cursor:grabbing}
.map-tooltip{position:absolute;background:var(--tooltip-bg);color:var(--tooltip-fg);padding:6px 12px;border-radius:6px;font-size:12px;font-family:'IBM Plex Mono',monospace;pointer-events:none;display:none;z-index:20;box-shadow:0 4px 16px rgba(0,0,0,0.3);border-left:3px solid var(--tip-accent,#888);line-height:1.5}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.skip-link{position:absolute;top:-100%;left:50%;transform:translateX(-50%);background:var(--bg);color:var(--fg);padding:8px 16px;border:2px solid var(--fg);border-radius:4px;font-size:14px;z-index:9999;text-decoration:none;transition:top .15s}
.skip-link:focus{top:8px}
.card:focus-visible{outline:2px solid var(--fg);outline-offset:-2px;border-radius:8px}
.inf-link:focus-visible{outline:2px solid currentColor;outline-offset:2px;border-radius:2px}
.nav-btn:focus-visible,.ctrl-btn:focus-visible,.filter-btn:focus-visible,.view-btn:focus-visible,.tag-fbtn:focus-visible,.btt:focus-visible{outline:2px solid var(--fg);outline-offset:2px}
/* Mobile filter drawer */
.filter-toggle{display:none;padding:8px 14px;font-size:12px;font-family:'IBM Plex Mono',monospace;background:transparent;color:var(--dim2);border:1px solid var(--filter-border);border-radius:4px;cursor:pointer;width:100%;text-align:left;margin-bottom:6px;min-height:44px;align-items:center}
.filter-toggle:hover{border-color:#666;color:var(--fg)}
.filter-toggle .arrow{display:inline-block;transition:transform .2s;margin-right:6px}
.filter-toggle.open .arrow{transform:rotate(90deg)}
.onboard-hint{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--dim);padding:8px 24px;text-align:center;position:relative;opacity:0;animation:fadeInHint .4s var(--ease-out-quart) .6s forwards}
@keyframes fadeInHint{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.onboard-hint .dismiss{background:none;border:none;color:var(--dim);font-size:14px;cursor:pointer;margin-left:8px;opacity:.6;transition:opacity .15s;vertical-align:middle}
.onboard-hint .dismiss:hover{opacity:1}
.onboard-hint.fade-out{animation:fadeOutHint .4s ease forwards}
@keyframes fadeOutHint{to{opacity:0;transform:translateY(-4px);max-height:0;padding:0;overflow:hidden;margin:0}}
.filter-drawer{overflow:hidden;transition:max-height .25s ease,opacity .2s ease}
.filter-drawer.collapsed{max-height:0!important;opacity:0;pointer-events:none}

/* Master-detail layout */
main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.md-wrap{display:flex;width:100%;flex:1;overflow:hidden}
.md-sidebar{width:280px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--border);background:var(--bg);scrollbar-width:thin;scrollbar-color:var(--scroll-thumb) var(--scroll-track)}
.md-main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.md-detail{flex:1;overflow-y:auto;padding:24px;min-width:0}
.md-main #graph-view,.md-main #map-view{flex:1;min-height:400px}

/* Sidebar items */
.md-era-label{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:12px 14px 4px;opacity:.6}
.md-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:13px;border-left:3px solid transparent;transition:background .15s,border-color .15s}
.md-item:hover{background:var(--card-hover)}
.md-item.active{background:var(--card-hover);border-left-color:currentColor;font-weight:500}
.md-item-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.md-item-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.md-item-period{font-size:10px;font-family:'IBM Plex Mono',monospace;opacity:.5;flex-shrink:0}

/* Detail pane header */
.md-detail-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.md-detail-header h2{font-family:'Instrument Serif',Georgia,serif;font-size:24px;font-weight:400}
.md-detail-header .period{font-family:'IBM Plex Mono',monospace;font-size:13px;opacity:.55}
.md-back-btn{background:none;border:1px solid var(--filter-border);color:var(--dim);font-size:12px;font-family:'IBM Plex Mono',monospace;padding:6px 12px;border-radius:4px;cursor:pointer;white-space:nowrap;transition:border-color .15s,color .15s;flex-shrink:0}
.md-back-btn:hover{border-color:#666;color:var(--fg)}

/* Always visible */
.md-wrap{opacity:1;transform:none}

/* Mobile drawer */
.md-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:119}
.md-drawer-btn{display:none;position:fixed;top:auto;bottom:80px;left:16px;z-index:121;width:44px;height:44px;border-radius:50%;background:var(--tooltip-bg);color:var(--tooltip-fg);border:1px solid var(--tray-border);font-size:18px;cursor:pointer;align-items:center;justify-content:center}

@media(max-width:600px){
.header{padding:12px 12px 6px}
.header h1{font-size:22px}
.header .meta{font-size:12px;margin-bottom:6px}
.search{padding:12px 14px;font-size:16px;margin-bottom:6px}
.timeline{padding:12px 12px 80px}
.card{padding:12px}
.compare-grid{grid-template-columns:1fr!important}
.wiki-thumb{max-width:140px;max-height:120px}
.wiki-thumb-wrap{margin:0 0 6px 10px}
/* Show filter toggle, hide raw filters */
.filter-toggle{display:flex}
/* Touch-friendly targets */
.view-btn{min-height:44px;padding:10px 14px;font-size:13px}
.filter-btn{min-height:38px;padding:8px 12px;font-size:12px}
.tag-fbtn{min-height:36px;padding:6px 10px;font-size:11px}
.ctrl-btn{min-height:44px;padding:8px 12px;font-size:13px}
.nav-btn{min-height:44px;padding:10px 14px;font-size:12px}
.concept-pill{min-height:32px;padding:6px 12px;font-size:12px;display:inline-flex;align-items:center}
.res-link{min-height:36px;padding:6px 10px;font-size:12px}
.compare-close{min-width:44px;min-height:44px;font-size:20px;display:flex;align-items:center;justify-content:center}
.btt{width:48px;height:48px;bottom:16px;right:16px}
.era-ind{bottom:70px;right:16px;font-size:10px}
/* Hide vertical timeline bar on mobile */
.timeline-bar{display:none}
/* Compare tray padding for bottom */
.compare-tray{padding:12px 12px 20px;max-height:50vh;overflow-y:auto}
/* Concept tooltip positioning */
.concept-def{position:fixed;bottom:auto;top:50%;left:50%;transform:translate(-50%,-50%);min-width:250px;max-width:85vw;z-index:200}
/* Card head wraps on narrow screens */
.card-head{flex-wrap:wrap;gap:4px}
}

@media(max-width:899px){
.md-sidebar{position:fixed;left:0;top:0;bottom:0;width:280px;z-index:120;transform:translateX(-100%);transition:transform .3s var(--ease-out-quart);box-shadow:4px 0 20px rgba(0,0,0,0.2);padding-top:60px}
.md-sidebar.open{transform:translateX(0)}
.timeline-bar{display:none}
.md-main{width:100%}
.md-detail{padding:16px 12px}
.md-drawer-btn{display:flex}
.md-detail-header h2{font-size:20px}
}

@media(min-width:601px) and (max-width:1024px){
/* Tablet: slightly larger touch targets */
.view-btn,.filter-btn,.ctrl-btn,.nav-btn{min-height:36px;padding:6px 12px}
.tag-fbtn{min-height:32px;padding:5px 10px}
.concept-pill{min-height:28px;padding:4px 10px}
}
@media(prefers-reduced-motion:reduce){
*,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important;scroll-behavior:auto!important}
.era{opacity:1!important;transform:none!important}
.card-body .section{opacity:1!important;transform:none!important}
.md-wrap,.md-sidebar{transition:none!important}
}
