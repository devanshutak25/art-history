{name:"Performance Art",period:"~1960s–present",sort:1962,wiki:w("Performance_art"),links:[],origin:"Roots in Futurism, Dada, Fluxus, Gutai. The body as medium.",about:"Durational, ritualistic, sometimes violent. Documentation as remaining trace.",artists:[{n:"Marina Abramović",u:w("Marina_Abramović")},{n:"Carolee Schneemann",u:w("Carolee_Schneemann")},{n:"Chris Burden",u:w("Chris_Burden")},{n:"Joseph Beuys",u:w("Joseph_Beuys")},{n:"Allan Kaprow",u:w("Allan_Kaprow")}],wk:[{t:"The Artist Is Present (Abramović)",y:2010,m:"performance (736 hours)"},{t:"How to Explain Pictures to a Dead Hare (Beuys)",y:1965,m:"performance"}],inf:["Social Practice Art","Relational Aesthetics"],by:["Dada","Futurism","Fluxus","Gutai Group"],cx:[{t:"durational performance",d:"Performance sustained over an extended time period, testing physical and mental endurance"},{t:"happening",d:"Kaprow's term for participatory events blurring the boundary between art and everyday life"}],hx:"The civil rights movement, feminism, and Vietnam War protests created a culture of direct action. Performance artists used their bodies as sites of political and personal expression.",geo:{r:"New York / Various",lat:40.71,lng:-74.01},tg:["performance"]},
{name:"Viennese Actionism",period:"~1960–1971",sort:1962,wiki:w("Viennese_Actionism"),links:[],origin:"Vienna. Most extreme performance movement — ritualistic, transgressive.",about:"Blood, viscera, ritual. Confronted repression. Members arrested.",artists:[{n:"Hermann Nitsch",u:w("Hermann_Nitsch")},{n:"Günter Brus",u:w("Günter_Brus")},{n:"Otto Muehl",u:w("Otto_Muehl")},{n:"Rudolf Schwarzkogler",u:w("Rudolf_Schwarzkogler")}],wk:[{t:"Orgies Mysteries Theater (Nitsch)",y:1962,m:"performance/ritual"},{t:"Self-Painting (Brus)",y:1964,m:"performance"}],inf:[],by:["Dada","Expressionism"],cx:[{t:"Aktion",d:"German term for the group's extreme performances involving bodily transgression"},{t:"Orgien Mysterien Theater",d:"Nitsch's ongoing ritualistic work incorporating animal blood, music, and catharsis"}],hx:"Post-WWII Austria was deeply in denial about its complicity in Nazism. The Actionists used extreme bodily performances to confront repression, taboo, and Austrian society's hidden violence.",geo:{r:"Vienna, Austria",lat:48.2,lng:16.37},tg:["performance"]},
{name:"Video Art",period:"~1960s–present",sort:1963,wiki:w("Video_art"),links:[{l:"ZKM Center for Art and Media",u:"https://zkm.de/en"}],origin:"Nam June Paik and the Sony Portapak. Anti-television, anti-commodity.",about:"Single-channel, multi-monitor, video sculpture, live feed.",artists:[{n:"Nam June Paik",u:w("Nam_June_Paik")},{n:"Bill Viola",u:w("Bill_Viola")},{n:"Bruce Nauman",u:w("Bruce_Nauman")},{n:"Pipilotti Rist",u:w("Pipilotti_Rist")},{n:"Shirin Neshat",u:w("Shirin_Neshat")},{n:"Joan Jonas",u:w("Joan_Jonas")}],wk:[{t:"TV Buddha (Paik)",y:1974,m:"closed-circuit video installation"},{t:"The Crossing (Viola)",y:1996,m:"two-channel video/sound installation"}],inf:["Digital Art","Post-Internet Art"],by:["Fluxus","Dada"],cx:[{t:"closed-circuit",d:"Live camera feed displayed on a monitor, creating real-time feedback loops"},{t:"single-channel video",d:"Video art played on one screen, akin to a film but with gallery presentation"}],hx:"The introduction of the portable Sony Portapak in 1965 gave artists affordable access to video for the first time, enabling a new medium distinct from both film and television.",geo:{r:"New York / Wuppertal, Germany",lat:40.71,lng:-74.01},tg:["film","installation"]},
{name:"Photorealism",period:"~1960s–present",sort:1965,wiki:w("Photorealism"),links:[],origin:"Photographs replicated with extreme fidelity.",about:"Paintings indistinguishable from photos. Uncanny precision forces perceptual questioning.",artists:[{n:"Chuck Close",u:w("Chuck_Close")},{n:"Richard Estes",u:w("Richard_Estes")},{n:"Audrey Flack",u:w("Audrey_Flack")},{n:"Ron Mueck",u:w("Ron_Mueck")},{n:"Duane Hanson",u:w("Duane_Hanson")}],wk:[{t:"Telephone Booths (Estes)",y:1967,m:"oil on canvas"},{t:"Marilyn (Vanitas) (Flack)",y:1977,m:"oil over acrylic on canvas"}],inf:[],by:["Pop Art","Realism"],cx:[{t:"photorealism",d:"Painting from photographs with such precision that the result appears photographic"},{t:"hyperrealism",d:"Extension of photorealism that adds or enhances details beyond photographic accuracy"}],hx:"The prevalence of photography and mass media in the 1960s raised questions about representation and reality. Photorealists turned the camera's way of seeing into painstaking painted form.",geo:{r:"New York City, USA",lat:40.71,lng:-74.01},tg:["painting","sculpture"]},
{name:"Conceptual Art",period:"~1966–present",sort:1966,wiki:w("Conceptual_art"),links:[{l:"Tate — Conceptual Art",u:"https://www.tate.org.uk/art/art-terms/c/conceptual-art"}],origin:"LeWitt (1967), Kosuth (1969). The idea is sufficient.",about:"Text, documentation, instructions, systems, language. Dominant OS of contemporary art.",artists:[{n:"Sol LeWitt",u:w("Sol_LeWitt")},{n:"Joseph Kosuth",u:w("Joseph_Kosuth")},{n:"Lawrence Weiner",u:w("Lawrence_Weiner")},{n:"On Kawara",u:w("On_Kawara")},{n:"John Baldessari",u:w("John_Baldessari")},{n:"Marcel Broodthaers",u:w("Marcel_Broodthaers")}],wk:[{t:"One and Three Chairs (Kosuth)",y:1965,m:"wooden chair, photograph, text"},{t:"Wall Drawing #118 (LeWitt)",y:1971,m:"crayon on wall (instructions-based)"}],inf:["Postmodernism","Installation Art","Social Practice Art","Post-Internet Art"],by:["Dada","Minimalism","Fluxus","Neo-Dada"],cx:[{t:"dematerialization",d:"Lucy Lippard's term for art's shift from physical objects to ideas and information"},{t:"institutional critique",d:"Art that examines and questions the structures of museums, galleries, and the art market"},{t:"tautology",d:"Kosuth's investigation of how art defines itself through language and definition"}],hx:"The late 1960s saw widespread questioning of institutions — political, cultural, and artistic. Conceptual Art challenged the very definition and commodity status of art objects.",geo:{r:"New York / London / Global",lat:40.71,lng:-74.01},tg:["mixed-media","installation","photography"]},
{name:"Arte Povera",period:"~1967–1972",sort:1967,wiki:w("Arte_Povera"),links:[],origin:"Italy. Celant named it. Humble, organic materials.",about:"Earth, fire, ice, cloth, neon, live animals. Process and entropy.",artists:[{n:"Michelangelo Pistoletto",u:w("Michelangelo_Pistoletto")},{n:"Jannis Kounellis",u:w("Jannis_Kounellis")},{n:"Mario Merz",u:w("Mario_Merz")},{n:"Alighiero Boetti",u:w("Alighiero_Boetti")},{n:"Giuseppe Penone",u:w("Giuseppe_Penone")}],wk:[{t:"Venus of the Rags (Pistoletto)",y:1967,m:"marble and rags"},{t:"Igloo di Giap (Merz)",y:1968,m:"metal, glass, neon, earth"}],inf:["Installation Art"],by:["Minimalism","Conceptual Art"],cx:[{t:"arte povera",d:"'Poor art' — using humble, everyday materials to challenge the commercial art system"},{t:"process and entropy",d:"Emphasizing natural decay, transformation, and the passage of time in artworks"}],hx:"Late 1960s Italy was experiencing political upheaval — the 'Hot Autumn' of 1969 brought strikes and student protests. Arte Povera rejected the commodification of American Pop and Minimalism.",geo:{r:"Turin / Rome, Italy",lat:45.07,lng:7.69},tg:["sculpture","installation","mixed-media"]},
{name:"Tropicália",period:"~1967–1972",sort:1967,wiki:w("Tropicália"),links:[],origin:"Brazil. Fused popular culture, psychedelia, Concretism, political resistance.",about:"Oiticica's Parangolés, Clark's Bichos. Anthropophagy. Suppressed by dictatorship.",artists:[{n:"Hélio Oiticica",u:w("Hélio_Oiticica")},{n:"Lygia Clark",u:w("Lygia_Clark")},{n:"Lygia Pape",u:w("Lygia_Pape")},{n:"Cildo Meireles",u:w("Cildo_Meireles")}],wk:[{t:"Tropicália (installation) (Oiticica)",y:1967,m:"mixed media installation"},{t:"Bichos (Lygia Clark)",y:1960,m:"hinged aluminum sculpture"}],inf:["Social Practice Art"],by:["Brazilian Neoconcretism","Pop Art"],cx:[{t:"Parangolé",d:"Oiticica's wearable capes and banners activated through dance and bodily movement"},{t:"Antropofagia",d:"Cultural 'cannibalism' — absorbing foreign influences and transforming them into something distinctly Brazilian"}],hx:"Brazil's military dictatorship (1964–1985) suppressed dissent. Artists used playful, participatory forms to resist censorship and assert cultural freedom under authoritarian rule.",geo:{r:"Rio de Janeiro, Brazil",lat:-22.91,lng:-43.17},tg:["installation","sculpture","performance","mixed-media"]},
{name:"Land Art",period:"~1968–present",sort:1968,wiki:w("Land_art"),links:[{l:"Dia — Lightning Field",u:"https://www.diaart.org/visit/visit-our-locations-702/walter-de-maria-the-lightning-field"},{l:"Roden Crater",u:"https://rodencrater.com/"}],origin:"Left galleries for the desert. Against commodification.",about:"Spiral Jetty, Lightning Field, Double Negative. Geological time and the sublime.",artists:[{n:"Robert Smithson",u:w("Robert_Smithson")},{n:"Michael Heizer",u:w("Michael_Heizer")},{n:"Walter De Maria",u:w("Walter_De_Maria")},{n:"James Turrell",u:w("James_Turrell")},{n:"Nancy Holt",u:w("Nancy_Holt")},{n:"Andy Goldsworthy",u:w("Andy_Goldsworthy")},{n:"Christo & Jeanne-Claude",u:w("Christo_and_Jeanne-Claude")}],wk:[{t:"Spiral Jetty (Smithson)",y:1970,m:"black basalt, earth, salt crystals"},{t:"The Lightning Field (De Maria)",y:1977,m:"400 stainless steel poles in desert"}],inf:[],by:["Minimalism"],cx:[{t:"site-specific",d:"Art made for and inseparable from a particular location"},{t:"entropy",d:"Smithson's fascination with geological decay and the irreversible dispersal of energy"}],hx:"The environmental movement gained momentum (first Earth Day 1970). Artists left galleries to work in remote landscapes, questioning art's relationship to commerce and the natural world.",geo:{r:"Utah / New Mexico, USA",lat:41.44,lng:-112.67},tg:["sculpture","installation"]},
{name:"Mono-ha",period:"~1968–1975",sort:1968,wiki:w("Mono-ha"),links:[],origin:"Japan. Stone on steel — minimal interventions foregrounding materiality.",about:"Anti-representational. Nishida philosophy + Zen. 'Encounter with matter.'",artists:[{n:"Lee Ufan",u:w("Lee_Ufan")},{n:"Sekine Nobuo",u:w("Nobuo_Sekine")},{n:"Kishio Suga",u:w("Kishio_Suga")}],wk:[{t:"Phase — Mother Earth (Sekine)",y:1968,m:"earth and concrete"},{t:"Relatum (Lee Ufan)",y:1969,m:"stone and steel plate"}],inf:[],by:["Minimalism","Gutai Group"],cx:[{t:"Mono-ha",d:"'School of Things' — movement focused on the relationships between raw, unaltered materials"},{t:"encounter",d:"Lee Ufan's concept of creating a meeting point between different materials and the viewer"}],hx:"Late 1960s Japan was experiencing rapid economic growth and student protests against the Vietnam War and the US-Japan Security Treaty.",geo:{r:"Tokyo, Japan",lat:35.68,lng:139.69},tg:["sculpture","installation"]},
{name:"Brazilian Neoconcretism",period:"~1959–1961",sort:1959,wiki:w("Neo-Concrete_Movement"),links:[],origin:"Gullar's 1959 manifesto. Reintroduced subjectivity and body into geometric abstraction.",about:"Clark's hinged Bichos, Oiticica's spatial color. Geometric art demanding bodily participation.",artists:[{n:"Lygia Clark",u:w("Lygia_Clark")},{n:"Hélio Oiticica",u:w("Hélio_Oiticica")},{n:"Lygia Pape",u:w("Lygia_Pape")},{n:"Ferreira Gullar",u:w("Ferreira_Gullar")}],wk:[{t:"Bichos (Clark)",y:1960,m:"hinged aluminum"},{t:"Núcleos (Oiticica)",y:1960,m:"painted wood panels"}],inf:["Tropicália","Installation Art"],by:["Constructivism","De Stijl"],cx:[{t:"Neoconcretism",d:"Rehumanizing geometric abstraction by requiring bodily participation and subjective experience"},{t:"Bicho",d:"'Beast' — Clark's hinged aluminum sculptures meant to be manipulated by the viewer"}],hx:"Brazil in the late 1950s was building its new capital Brasília (inaugurated 1960), embodying modernist utopian ideals. Neoconcretists challenged the rigidity of European geometric abstraction.",geo:{r:"Rio de Janeiro, Brazil",lat:-22.91,lng:-43.17},tg:["sculpture","installation","painting"]},
{name:"Feminist Art",period:"~1960s–present",sort:1969,wiki:w("Feminist_art_movement"),links:[{l:"Brooklyn Museum — Dinner Party",u:"https://www.brooklynmuseum.org/exhibitions/dinner_party"}],origin:"Second-wave feminism challenged exclusion from art history.",about:"Reclaimed the female body, domesticity, craft. A critical framework across all media.",artists:[{n:"Judy Chicago",u:w("Judy_Chicago")},{n:"Barbara Kruger",u:w("Barbara_Kruger")},{n:"Cindy Sherman",u:w("Cindy_Sherman")},{n:"Guerrilla Girls",u:w("Guerrilla_Girls")},{n:"Louise Bourgeois",u:w("Louise_Bourgeois")},{n:"Ana Mendieta",u:w("Ana_Mendieta")},{n:"Faith Ringgold",u:w("Faith_Ringgold")}],wk:[{t:"The Dinner Party (Chicago)",y:1979,m:"ceramic, porcelain, textile"},{t:"Untitled Film Stills (Sherman)",y:1978,m:"gelatin silver prints"}],inf:["Postmodernism"],by:["Performance Art","Conceptual Art"],cx:[{t:"the male gaze",d:"Laura Mulvey's theory that visual culture presents women from a masculine point of view"},{t:"body politics",d:"Using the body as a site for challenging gender norms and patriarchal power structures"}],hx:"The women's liberation movement of the late 1960s–70s challenged systemic gender discrimination. The Guerrilla Girls' 1985 poster asked: 'Do women have to be naked to get into the Met?'",geo:{r:"Los Angeles / New York, USA",lat:34.05,lng:-118.24},tg:["painting","sculpture","performance","installation","photography","textile","mixed-media"]}

{name:"Pattern and Decoration",period:"~1975–1985",sort:1975,wiki:w("Pattern_and_Decoration"),links:[],origin:"Countered Minimalism. Reclaimed ornament, craft, non-Western decorative traditions.",about:"Textile patterns, Islamic geometry, feminist reclamation of 'women's work.'",artists:[{n:"Miriam Schapiro",u:w("Miriam_Schapiro")},{n:"Robert Kushner",u:w("Robert_Kushner")},{n:"Joyce Kozloff",u:w("Joyce_Kozloff")}],wk:[{t:"Anatomy of a Kimono (Schapiro)",y:1976,m:"acrylic, fabric on canvas"},{t:"An Interior Decorated (Kozloff)",y:1979,m:"ceramic tile installation"}],inf:[],by:["Feminist Art","Islamic Art & Architecture"],cx:[{t:"femmage",d:"Schapiro's term for collage using traditionally feminine materials like fabric and sequins"},{t:"decorative impulse",d:"Reclaiming ornament as a legitimate artistic practice after Minimalism's austerity"}],hx:"The 1970s backlash against Minimalism's severity coincided with second-wave feminism's challenge to the hierarchy that placed 'craft' and 'decoration' below 'fine art.'",geo:{r:"New York City, USA",lat:40.71,lng:-74.01},tg:["painting","textile","ceramics","installation"]},
{name:"Aboriginal Australian Art",period:"~1971–present",sort:1971,wiki:w("Indigenous_Australian_art"),links:[{l:"NGA — Aboriginal Art",u:"https://nga.gov.au/collections/atsi/"}],origin:"Papunya Tula (1971): sacred Dreaming narratives onto canvas. Dot painting.",about:"Aerial-view Dreaming maps. Concealment and revelation. Art as land title. Prices rival Western contemporary.",artists:[{n:"Emily Kame Kngwarreye",u:w("Emily_Kame_Kngwarreye")},{n:"Clifford Possum Tjapaltjarri",u:w("Clifford_Possum_Tjapaltjarri")},{n:"Rover Thomas",u:w("Rover_Thomas")},{n:"Dorothy Napangardi",u:w("Dorothy_Napangardi")}],wk:[{t:"Earth's Creation (Kngwarreye)",y:1994,m:"synthetic polymer on canvas"},{t:"Warlugulong (Tjapaltjarri)",y:1977,m:"synthetic polymer on canvas"}],inf:[],by:[],cx:[{t:"Dreaming / Tjukurpa",d:"Aboriginal cosmology connecting past, present, and future through ancestral narratives encoded in landscape"},{t:"dot painting",d:"Technique using dots to simultaneously reveal and conceal sacred knowledge in the artwork"}],hx:"The 1967 Australian referendum recognized Aboriginal people in the census. The 1971 Papunya painting movement gave Indigenous Australians a powerful way to assert land rights through art.",geo:{r:"Papunya, Northern Territory, Australia",lat:-23.23,lng:131.9},tg:["painting"]},

// Helpers
const _escEl=document.createElement("div");
function esc(s){_escEl.textContent=s;return _escEl.innerHTML}
function debounce(fn,ms){let t;return function(...a){clearTimeout(t);t=setTimeout(()=>fn.apply(this,a),ms)}}
function hi(t,q){if(!q)return esc(t);return esc(t).replace(new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi"),"<mark>$1</mark>")}
function an(a){return typeof a==="string"?a:a.n}
function slug(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")}

function toggleFilterDrawer(){
  const drawer=document.getElementById("filter-drawer");
  const btn=document.getElementById("filter-toggle");
  const isOpen=!drawer.classList.contains("collapsed");
  if(isOpen){
    drawer.classList.add("collapsed");
    btn.classList.remove("open");
    btn.setAttribute("aria-expanded","false");
  }else{
    drawer.classList.remove("collapsed");
    drawer.style.maxHeight=drawer.scrollHeight+"px";
    btn.classList.add("open");
    btn.setAttribute("aria-expanded","true");
  }
}
// Update drawer max-height after render (content may change)
function updateDrawerHeight(){
  const drawer=document.getElementById("filter-drawer");
  if(drawer&&!drawer.classList.contains("collapsed")){
    drawer.style.maxHeight=drawer.scrollHeight+"px";
  }
}

function getAllItems(){
  const r=[];
  D.forEach(e=>e.items.forEach(i=>r.push({era:e.era,item:i})));
  return r;
}

function getFilteredItems(){
  const ql=q.toLowerCase();
  const r=[];
  D.forEach(e=>{
    if(se&&e.era!==se)return;
    e.items.forEach(i=>{
      if(tagFilter.size>0&&(!i.tg||!i.tg.some(t=>tagFilter.has(t))))return;
      if(ql){
        const m=i.name.toLowerCase().includes(ql)||i.about.toLowerCase().includes(ql)||i.origin.toLowerCase().includes(ql)||i.artists.some(a=>an(a).toLowerCase().includes(ql))||(i.cx&&i.cx.some(c=>c.t.toLowerCase().includes(ql)||c.d.toLowerCase().includes(ql)))||(i.hx&&i.hx.toLowerCase().includes(ql));
        if(!m)return;
      }
      r.push({era:e.era,item:i});
    });
  });
  return r;
}

function getFilteredEras(){
  const items=getFilteredItems();
  const map=new Map();
  items.forEach(({era,item})=>{
    if(!map.has(era))map.set(era,[]);
    map.get(era).push(item);
  });
  const r=[];
  D.forEach(e=>{if(map.has(e.era))r.push({era:e.era,items:map.get(e.era)})});
  return r;
}

// Theme
function toggleTheme(){
  const cur=document.documentElement.getAttribute("data-theme");
  const nxt=cur==="light"?"dark":"light";
  document.documentElement.setAttribute("data-theme",nxt);
  localStorage.setItem("theme",nxt);
  document.getElementById("theme-btn").innerHTML=nxt==="light"?"&#9789;":"&#9788;";
  document.getElementById("theme-btn").setAttribute("aria-label",nxt==="light"?"Switch to dark theme":"Switch to light theme");
  if(curView==="timeline")render();
  if(curView==="graph")drawGraph();
  if(curView==="map")drawMap();
}
(function initTheme(){
  const t=localStorage.getItem("theme")||"dark";
  if(t==="light"){document.documentElement.setAttribute("data-theme","light");document.addEventListener("DOMContentLoaded",()=>{document.getElementById("theme-btn").innerHTML="&#9789;"});}
})();

// URL hash
function updateHash(name){
  if(name)history.replaceState(null,"","#"+slug(name));
  else history.replaceState(null,"",window.location.pathname);
}

function findBySlug(s){
  for(const e of D)for(const i of e.items)if(slug(i.name)===s)return{era:e.era,item:i};
  return null;
}

// Wiki thumbnails (throttled — max 3 concurrent)
let _wikiActive=0;const _wikiQueue=[];
function _processWikiQueue(){
  while(_wikiActive<3&&_wikiQueue.length>0){
    const{item,el}=_wikiQueue.shift();
    _fetchWikiThumbInner(item,el);
  }
}
function fetchWikiThumb(item,el){
  const wiki=item.wiki;if(!wiki)return;
  const title=wiki.split("/wiki/")[1];if(!title)return;
  if(wikiCache[title]!==undefined){
    if(wikiCache[title])el.innerHTML='<img class="wiki-thumb" src="'+wikiCache[title]+'" alt="'+esc(item.name)+'" loading="lazy"/>';
    return;
  }
  _wikiQueue.push({item,el});
  _processWikiQueue();
}
function _fetchWikiThumbInner(item,el){
  const title=item.wiki.split("/wiki/")[1];
  _wikiActive++;
  fetch("https://en.wikipedia.org/api/rest_v1/page/summary/"+title)
    .then(r=>r.json()).then(d=>{
      const src=d.thumbnail&&d.thumbnail.source;
      wikiCache[title]=src||null;
      if(src&&el.isConnected)el.innerHTML='<img class="wiki-thumb" src="'+src+'" alt="'+esc(item.name)+'" loading="lazy"/>';
    }).catch(()=>{wikiCache[title]=null;})
    .finally(()=>{_wikiActive--;_processWikiQueue();});
}

// Compare
function toggleCompare(){
  compareMode=!compareMode;
  document.getElementById("compare-btn").className="ctrl-btn"+(compareMode?" active-mode":"");
  if(!compareMode){compareItems=[];renderCompare();}
}

function addToCompare(era,item){
  if(!compareMode)return false;
  const k=era+"|"+item.name;
  if(compareItems.find(c=>c.k===k))return true;
  if(compareItems.length>=3)return true;
  compareItems.push({k,era,item});
  renderCompare();
  return true;
}

function removeFromCompare(k){
  compareItems=compareItems.filter(c=>c.k!==k);
  renderCompare();
}

function clearCompare(){
  compareItems=[];compareMode=false;
  document.getElementById("compare-btn").className="ctrl-btn";
  document.body.style.paddingBottom="";
  renderCompare();
}

function renderCompare(){
  const tray=document.getElementById("compare-tray");
  const cont=document.getElementById("compare-content");
  if(!compareItems.length){tray.classList.remove("show");document.body.style.paddingBottom="";return;}
  tray.classList.add("show");
  document.getElementById("compare-heading").textContent="Comparing "+compareItems.length+" of 3";
  // Add bottom padding so content isn't hidden behind tray
  requestAnimationFrame(()=>{document.body.style.paddingBottom=tray.offsetHeight+"px";});
  const cols=compareItems.length;
  let h='<div class="compare-grid" style="grid-template-columns:repeat('+cols+',1fr)">';
  compareItems.forEach(c=>{
    const i=c.item;const col=EC[c.era];
    h+='<div class="compare-col">';
    h+='<h3 style="color:'+col.accent+'">'+esc(i.name)+' <button class="remove-btn" onclick="removeFromCompare(\''+c.k.replace(/'/g,"\\'")+'\')" aria-label="Remove '+esc(i.name)+' from comparison">[x]</button></h3>';
    h+='<div class="compare-row"><div class="clbl">Period</div><div class="cval">'+esc(i.period)+'</div></div>';
    if(i.geo)h+='<div class="compare-row"><div class="clbl">Origin</div><div class="cval">'+esc(i.geo.r)+'</div></div>';
    if(i.cx)h+='<div class="compare-row"><div class="clbl">Concepts</div><div class="cval">'+i.cx.map(c=>esc(c.t)).join(", ")+'</div></div>';
    h+='<div class="compare-row"><div class="clbl">Artists</div><div class="cval">'+i.artists.slice(0,3).map(a=>esc(an(a))).join(", ")+'</div></div>';
    if(i.tg)h+='<div class="compare-row"><div class="clbl">Mediums</div><div class="cval">'+i.tg.join(", ")+'</div></div>';
    const infs=[];if(i.by&&i.by.length)infs.push("Influenced by: "+i.by.join(", "));if(i.inf&&i.inf.length)infs.push("Influenced: "+i.inf.join(", "));
    if(infs.length)h+='<div class="compare-row"><div class="clbl">Influences</div><div class="cval" style="font-size:10.5px">'+infs.map(esc).join("<br>")+'</div></div>';
    h+='</div>';
  });
  h+='</div>';

// Medium tags

// Timeline bar (rendered once — static data)
let _timelineBarRendered=false;
function renderTimelineBar(){
  if(_timelineBarRendered)return;
  const bar=document.getElementById("timeline-bar");
  const eras=D;
  function logScale(span){return Math.log10(Math.max(span,1)+1)}
  const eraData=eras.map(e=>{
    const eMin=Math.min(...e.items.map(i=>i.sort));
    const eMax=Math.max(...e.items.map(i=>i.sort));
    return{era:e,span:eMax-eMin,logW:logScale(eMax-eMin)};
  });
  const totalLog=eraData.reduce((s,d)=>s+d.logW,0);
  let heights=eraData.map(d=>Math.max((d.logW/totalLog)*100,2));
  const hSum=heights.reduce((s,h)=>s+h,0);
  heights=heights.map(h=>h/hSum*100);
  let h="";
  eraData.forEach((d,i)=>{
    const c=EC[d.era.era];
    const ht=heights[i];
    const eraEsc=esc(d.era.era).replace(/'/g,"\\'");
    const eMin=Math.min(...d.era.items.map(it=>it.sort));
    const eMax=Math.max(...d.era.items.map(it=>it.sort));
    const fmtBar=y=>{if(y<0){const a=Math.abs(y);return(a>=1000?'~'+(a/1000).toFixed(0)+'k':'~'+a)+' BCE';}return y>2000?'present':y+' CE';};
    h+='<div class="tbar-seg" style="height:'+ht.toFixed(2)+'%;background:'+c.accent+';--tbar-accent:'+c.accent+'" data-era="'+esc(d.era.era)+'" onclick="filterEra(\''+eraEsc+'\')">';
    h+='<div class="tbar-tooltip"><span class="tbar-tip-era">'+esc(d.era.era)+'</span><br><span class="tbar-tip-detail">'+d.era.items.length+' movements &middot; '+fmtBar(eMin)+' – '+fmtBar(eMax)+'</span></div>';
    h+='</div>';
  });
  bar.innerHTML=h;
  _timelineBarRendered=true;
}
function updateTimelineBarSelection(){
  document.querySelectorAll(".tbar-seg").forEach(seg=>{
    seg.classList.toggle("selected",!!se&&seg.dataset.era===se);
  });
}

}

// Build card body HTML (shared between timeline cards and detail pane)
function buildCardBody(eraName, item, query, isDetailMode){
  const c=EC[eraName]||{accent:"#888",text:"#CCC"};
  const tx=getTextColor(eraName);
  const k=eraName+"|"+item.name;
  let body='';
  // Wiki thumb placeholder
  body+='<div class="wiki-thumb-wrap" data-wiki="1"></div>';
  // Origin
  body+='<div class="section"><span class="label" style="color:'+c.accent+'">How It Began</span><p>'+hi(item.origin,query)+'</p></div>';
  // Core ideas
  body+='<div class="section"><span class="label" style="color:'+c.accent+'">What Defines It</span><p>'+hi(item.about,query)+'</p></div>';
  // Historical context
  if(item.hx){body+='<div class="section"><span class="label" style="color:'+c.accent+'">Historical Context</span><p class="hx-text">'+hi(item.hx,query)+'</p></div>';}
  // Geographic origin
  if(item.geo){body+='<div class="section"><span class="label" style="color:'+c.accent+'">Where</span><span class="geo-label">'+esc(item.geo.r)+'</span></div>';}
  // Artworks
  if(item.wk&&item.wk.length){
    body+='<div class="section"><span class="label" style="color:'+c.accent+'">Notable Works</span><ul class="artwork-list">';
    item.wk.forEach(w=>{body+='<li><span class="artwork-title">'+esc(w.t)+'</span> <span class="artwork-meta">('+w.y+', '+esc(w.m)+')</span></li>'});
    body+='</ul></div>';
  }
  // Key concepts (clickable + focusable)
  if(item.cx&&item.cx.length){
    body+='<div class="section"><span class="label" style="color:'+c.accent+'">Vocabulary</span><div style="display:flex;flex-wrap:wrap;gap:2px">';
    item.cx.forEach(cx=>{body+='<span class="concept-pill" tabindex="0" role="button" aria-expanded="false" style="background:'+c.accent+'20;color:'+tx+'" onclick="toggleConcept(this)">'+esc(cx.t)+'<span class="concept-def" role="tooltip">'+esc(cx.d)+'</span></span>'});
    body+='</div></div>';
  }
  // Medium tags
  if(item.tg&&item.tg.length){
    body+='<div class="section"><span class="label" style="color:'+c.accent+'">Mediums</span><div class="medium-tags">';
    item.tg.forEach(t=>{body+='<span class="med-tag" style="background:'+c.accent+'15;color:'+tx+'">'+esc(t)+'</span>'});
    body+='</div></div>';
  }
  // Influences (keyboard-accessible links)
  if((item.by&&item.by.length)||(item.inf&&item.inf.length)){
    body+='<div class="section"><span class="label" style="color:'+c.accent+'">Influences</span>';
    if(item.by&&item.by.length){
      body+='<div style="font-size:12.5px;margin-bottom:4px"><strong class="inf-label">Influenced by:</strong> ';
      body+=item.by.map(n=>'<a href="#'+slug(n)+'" class="inf-link" style="color:'+tx+'" tabindex="0" role="link" onclick="event.stopPropagation();event.preventDefault();goToMovement(\''+n.replace(/'/g,"\\'")+'\')" onkeydown="if(event.key===\'Enter\'){event.stopPropagation();event.preventDefault();goToMovement(\''+n.replace(/'/g,"\\'")+'\')}">'+esc(n)+'</a>').join(", ");
      body+='</div>';
    }
    if(item.inf&&item.inf.length){
      body+='<div style="font-size:12.5px"><strong class="inf-label">Influenced:</strong> ';
      body+=item.inf.map(n=>'<a href="#'+slug(n)+'" class="inf-link" style="color:'+tx+'" tabindex="0" role="link" onclick="event.stopPropagation();event.preventDefault();goToMovement(\''+n.replace(/'/g,"\\'")+'\')" onkeydown="if(event.key===\'Enter\'){event.stopPropagation();event.preventDefault();goToMovement(\''+n.replace(/'/g,"\\'")+'\')}">'+esc(n)+'</a>').join(", ");
      body+='</div>';
    }
    body+='</div>';
  }
  // Key figures
  const tg=item.artists.map(a=>{const nm2=an(a);const u=typeof a==="object"&&a.u?a.u:null;const inn=hi(nm2,query);const ct=u?'<a class="xlink" href="'+u+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">'+inn+'</a>':inn;return'<span class="tag" style="background:'+c.accent+'18;border:1px solid '+c.accent+'30;color:'+tx+'">'+ct+'</span>'}).join("");
  body+='<div class="section"><span class="label" style="color:'+c.accent+'">Artists</span><div class="tags">'+tg+'</div></div>';
  // Resources
  let rl="";const al=[];if(item.wiki)al.push({l:"Wikipedia",u:item.wiki});if(item.links)item.links.forEach(x=>al.push(x));
  if(al.length){rl='<div class="section"><span class="label" style="color:'+c.accent+'">Resources</span><div class="res-links">'+al.map(x=>'<a class="res-link" href="'+x.u+'" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:'+tx+';border:1px solid '+c.accent+'25">'+esc(x.l)+' &#8599;</a>').join("")+'</div></div>';}
  body+=rl;
  // Navigation buttons
  if(isDetailMode){
    body+='<div class="nav-btns"><button class="nav-btn" onclick="event.stopPropagation();detailNavPrev()">&larr; Previous Movement</button><button class="nav-btn" onclick="event.stopPropagation();detailNavNext()">&rarr; Next Movement</button></div>';
  }else{
    body+='<div class="nav-btns"><button class="nav-btn" onclick="event.stopPropagation();navPrev(\''+k.replace(/'/g,"\\'")+'\')">&larr; Previous Movement</button><button class="nav-btn" onclick="event.stopPropagation();navNext(\''+k.replace(/'/g,"\\'")+'\')">&rarr; Next Movement</button></div>';
  }
  return body;
}

// Main render
function render(){
  allFiltered=getFilteredItems();
  const tot=allFiltered.length;
  const _total=getAllItems().length;
  const _isFiltered=q||se||tagFilter.size>0;
  let dateRange="~40,000 BCE – present";
  if(_isFiltered&&tot>0){
    let minY=Infinity,maxY=-Infinity;
    allFiltered.forEach(({item})=>{if(item.sort<minY)minY=item.sort;if(item.sort>maxY)maxY=item.sort;});
    const fmtY=y=>{
      if(y<0){const a=Math.abs(y);return(a>=1000?"~"+a.toLocaleString():"~"+a)+" BCE";}
      if(y>2000)return"present";
      return""+y+" CE";
    };
    dateRange=fmtY(minY)+" – "+fmtY(maxY);
  }
  document.getElementById("meta").textContent=(_isFiltered?tot+" of "+_total:tot)+" movements · "+dateRange;

  // Era filters
  const fl=document.getElementById("filters");fl.innerHTML="";
  const ab=document.createElement("button");ab.className="filter-btn"+(!se?" active":"");ab.textContent="All";ab.onclick=()=>{se=null;render();if(curView==="graph")drawGraph();if(curView==="map")drawMap()};fl.appendChild(ab);
  D.forEach(e=>{const b=document.createElement("button");b.className="filter-btn"+(se===e.era?" active":"");b.textContent=e.era;const c=EC[e.era];if(se===e.era&&c){b.style.background=c.accent+"25";b.style.color=c.accent;b.style.borderColor=c.accent+"40";b.style.borderStyle="dashed"}b.onclick=()=>{se=se===e.era?null:e.era;render();if(curView==="graph")drawGraph();if(curView==="map")drawMap()};fl.appendChild(b)});

  // Tag filters
  const tf=document.getElementById("tag-filters");tf.innerHTML="";
  const allTags=getAllTags();
  const sortedTags=[...allTags.entries()].sort((a,b)=>b[1]-a[1]);
  sortedTags.forEach(([tag,count])=>{
    const b=document.createElement("button");
    b.className="tag-fbtn"+(tagFilter.has(tag)?" active":"");
    b.textContent=tag+" ("+count+")";
    b.onclick=()=>{if(tagFilter.has(tag))tagFilter.delete(tag);else tagFilter.add(tag);render();if(curView==="graph")drawGraph();if(curView==="map")drawMap()};
    tf.appendChild(b);
  });

  // Timeline bar
  renderTimelineBar();
  updateTimelineBarSelection();

  // Always update sidebar
  renderSidebar();

  // Check if active movement is still in filtered results
  if(activeMovement&&!allFiltered.find(f=>f.era+"|"+f.item.name===activeMovement.key)){
    if(allFiltered.length>0){switchDetail(allFiltered[0].era+"|"+allFiltered[0].item.name);}
    else{activeMovement=null;document.getElementById("md-detail").innerHTML='<div class="empty"><span class="empty-icon">&#9711;</span><p class="empty-text">No movements match your current filters.</p><p class="empty-hint">Try broadening your search or press Escape to reset.</p></div>';}
  }

  updateDrawerHeight();
}

// === MASTER-DETAIL MODE ===

function selectMovement(eraName, item){
  activeMovement={era:eraName, item:item, key:eraName+"|"+item.name};

  renderSidebar();
  if(curView==="timeline")renderDetail();
}

// Legacy aliases
function enterDetailMode(eraName, item){selectMovement(eraName, item);}
function exitDetailMode(){
  // Reset to random movement
  const items=getAllItems();
  if(items.length){const pick=items[Math.floor(Math.random()*items.length)];selectMovement(pick.era,pick.item);}
}

function renderSidebar(){
  const f=getFilteredEras();
  const sidebar=document.getElementById("md-sidebar");
  let h='';
  f.forEach(era=>{
    const c=EC[era.era]||{accent:"#888"};
    h+='<div class="md-era-label" style="color:'+c.accent+'">'+esc(era.era)+'</div>';
    era.items.forEach(it=>{
      const k=era.era+"|"+it.name;
      const isActive=activeMovement&&activeMovement.key===k;
      h+='<div class="md-item'+(isActive?' active':'')+'" data-md-key="'+esc(k)+'" style="color:'+c.accent+'" onclick="switchDetail(\''+k.replace(/'/g,"\\'")+'\',true)">';
      h+='<span class="md-item-dot" style="background:'+c.accent+'"></span>';
      h+='<span class="md-item-name">'+esc(it.name)+'</span>';
      h+='<span class="md-item-period">'+esc(it.period)+'</span>';
      h+='</div>';
    });
  });

  // Auto-scroll active item into view

function renderDetail(){
  if(!activeMovement)return;
  const item=activeMovement.item;
  const eraName=activeMovement.era;
  const c=EC[eraName]||{accent:"#888",text:"#CCC"};
  const tx=getTextColor(eraName);
  const detail=document.getElementById("md-detail");

  let h='<div class="md-detail-header">';
  h+='<div>';
  const nm=item.wiki?'<a class="xlink" href="'+item.wiki+'" target="_blank" rel="noopener" style="color:'+c.accent+'">'+hi(item.name,q)+'</a>':'<span style="color:'+c.accent+'">'+hi(item.name,q)+'</span>';
  h+='<h2>'+nm+'</h2>';
  h+='<div class="period" style="color:'+tx+'">'+esc(item.period)+'</div>';
  h+='</div>';
  h+='<button class="md-back-btn" onclick="randomMovement()">&#127922; Random</button>';
  h+='</div>';

  h+='<div class="card-body md-detail-body" style="color:'+tx+';max-height:none;overflow:visible">';
  h+=buildCardBody(eraName, item, q, true);
  h+='</div>';

  detail.innerHTML=h;
  detail.scrollTop=0;

  // Fetch wiki thumb immediately in detail mode
  const wrap=detail.querySelector('.wiki-thumb-wrap');
  if(wrap){fetchWikiThumb(item,wrap);}

  // Make sections visible immediately (no card expand animation needed)
  detail.querySelectorAll('.card-body .section').forEach(s=>{s.style.opacity='1';s.style.transform='none'});
}

function switchDetail(key,userClick){
  const parts=key.split("|");
  let found=null;
  for(const e of D)for(const i of e.items){
    if(e.era===parts[0]&&i.name===parts[1]){found={era:e.era,item:i};break;}
    if(found)break;
  }
  if(!found)return;
  activeMovement={era:found.era, item:found.item, key:key};
  updateHash(found.item.name);
  // Update sidebar active class
  document.querySelectorAll('.md-item').forEach(el=>{
    el.classList.toggle('active',el.getAttribute('data-md-key')===key);
  });
  const activeEl=document.querySelector('.md-item.active');
  if(activeEl)activeEl.scrollIntoView({block:"nearest"});
  if(userClick&&curView!=="timeline")switchView("timeline");
  renderDetail();
  // Close mobile drawer if open
  if(window.innerWidth<900){
    document.getElementById("md-sidebar").classList.remove("open");
    document.getElementById("md-backdrop").style.display="none";
  }
}

function detailNavPrev(){
  if(!activeMovement)return;
  const idx=allFiltered.findIndex(f=>f.era+"|"+f.item.name===activeMovement.key);
  if(idx<=0)return;
  const prev=allFiltered[idx-1];
  switchDetail(prev.era+"|"+prev.item.name);
}

function detailNavNext(){
  if(!activeMovement)return;
  const idx=allFiltered.findIndex(f=>f.era+"|"+f.item.name===activeMovement.key);
  if(idx<0||idx>=allFiltered.length-1)return;
  const next=allFiltered[idx+1];
  switchDetail(next.era+"|"+next.item.name);
}

function toggleMdDrawer(){
  const sidebar=document.getElementById("md-sidebar");
  const backdrop=document.getElementById("md-backdrop");
  const isOpen=sidebar.classList.contains("open");
  if(isOpen){
    sidebar.classList.remove("open");
    backdrop.style.display="none";
  }else{
    sidebar.classList.add("open");
    backdrop.style.display="block";
  }
}

// Back to top + era indicator (rAF-throttled)
let _scrollTicking=false;
window.addEventListener("scroll",()=>{

  _scrollTicking=true;
  requestAnimationFrame(()=>{
    _scrollTicking=false;

    if(cur&&window.scrollY>200){ind.textContent=cur;ind.classList.add("show");}
    else ind.classList.remove("show");
  });
},{passive:true});

// Keyboard navigation
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"){
    if(e.key==="Escape"){e.target.blur();q="";document.getElementById("search").value="";render();return;}
    return;
  }
  if(e.key==="/"){e.preventDefault();document.getElementById("search").focus();return;}
  if(e.key==="Escape"){
    q="";document.getElementById("search").value="";tagFilter.clear();se=null;ex.clear();switchView("timeline");render();return;
  }
  if(e.key==="r"||e.key==="R"){randomMovement();return;}
  if(e.key==="ArrowDown"){e.preventDefault();detailNavNext();return;}
  if(e.key==="ArrowUp"){e.preventDefault();detailNavPrev();return;}
});

// === GRAPH VIEW ===
let graphNodes=[],graphEdges=[],graphDrag=null,graphAnim=null,hovNode=null;
let _graphHandlersBound=false,_graphPaint=null;

function drawGraph(){
  const cv=document.getElementById("graph-canvas");
  const ct=cv.getContext("2d");
  const dpr=window.devicePixelRatio||1;
  const rect=cv.parentElement.getBoundingClientRect();
  cv.width=rect.width*dpr;cv.height=rect.height*dpr;
  cv.style.width=rect.width+"px";cv.style.height=rect.height+"px";
  ct.scale(dpr,dpr);
  const W=rect.width,H=rect.height;
  hovNode=null;

  const all=getFilteredItems();
  const nameMap=new Map();
  graphNodes=all.map((a,i)=>{
    const existing=graphNodes.find(n=>n.name===a.item.name);
    const x=existing?existing.x:W/2+(Math.random()-0.5)*W*0.6;
    const y=existing?existing.y:H/2+(Math.random()-0.5)*H*0.6;
    const node={i,name:a.item.name,era:a.era,x,y,vx:0,vy:0,r:6};
    nameMap.set(a.item.name,node);
    return node;
  });

  graphEdges=[];
  all.forEach(a=>{
    if(a.item.inf)a.item.inf.forEach(target=>{
      const src=nameMap.get(a.item.name);
      const tgt=nameMap.get(target);
      if(src&&tgt)graphEdges.push({s:src,t:tgt});
    });
  });
  // Connection count per node
  const _connCount=new Map();
  graphEdges.forEach(e=>{_connCount.set(e.s.name,(_connCount.get(e.s.name)||0)+1);_connCount.set(e.t.name,(_connCount.get(e.t.name)||0)+1);});
  graphNodes.forEach(n=>{n.conn=_connCount.get(n.name)||0;});

  if(graphAnim)cancelAnimationFrame(graphAnim);
  let steps=0;const maxSteps=300;

  function simulate(){
    const alpha=Math.max(0.01,1-steps/maxSteps);
    // Repulsion
    for(let i=0;i<graphNodes.length;i++){
      for(let j=i+1;j<graphNodes.length;j++){
        let dx=graphNodes[j].x-graphNodes[i].x;
        let dy=graphNodes[j].y-graphNodes[i].y;
        let d=Math.sqrt(dx*dx+dy*dy)||1;
        let f=200*alpha/(d*d);
        graphNodes[i].vx-=dx/d*f;graphNodes[i].vy-=dy/d*f;
        graphNodes[j].vx+=dx/d*f;graphNodes[j].vy+=dy/d*f;
      }
    }
    // Attraction
    graphEdges.forEach(e=>{
      let dx=e.t.x-e.s.x,dy=e.t.y-e.s.y;
      let d=Math.sqrt(dx*dx+dy*dy)||1;
      let f=(d-80)*0.005*alpha;
      e.s.vx+=dx/d*f;e.s.vy+=dy/d*f;
      e.t.vx-=dx/d*f;e.t.vy-=dy/d*f;
    });
    // Gravity + damping
    graphNodes.forEach(n=>{
      if(graphDrag&&graphDrag.node===n)return;
      n.vx+=(W/2-n.x)*0.0005*alpha;
      n.vy+=(H/2-n.y)*0.0005*alpha;
      n.vx*=0.85;n.vy*=0.85;
      n.x+=n.vx;n.y+=n.vy;
      n.x=Math.max(10,Math.min(W-10,n.x));
      n.y=Math.max(10,Math.min(H-10,n.y));
    });
    steps++;
    paint();
    if(steps<maxSteps)graphAnim=requestAnimationFrame(simulate);
  }

  function paint(){
    const isDark=document.documentElement.getAttribute("data-theme")!=="light";
    // Radial gradient background
    const grad=ct.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.6);
    grad.addColorStop(0,isDark?"#151515":"#F2F0EB");
    grad.addColorStop(1,isDark?"#080808":"#E8E4DD");
    ct.fillStyle=grad;ct.fillRect(0,0,W,H);
    // Edges with hover highlighting
    graphEdges.forEach(e=>{
      const connected=hovNode&&(e.s===hovNode||e.t===hovNode);
      ct.lineWidth=connected?1.5:0.8;
      ct.strokeStyle=isDark?(connected?"rgba(255,255,255,0.5)":"rgba(255,255,255,0.15)"):(connected?"rgba(60,40,20,0.45)":"rgba(60,40,20,0.14)");
      ct.beginPath();ct.moveTo(e.s.x,e.s.y);ct.lineTo(e.t.x,e.t.y);ct.stroke();
    });
    // Nodes
    graphNodes.forEach(n=>{
      const col=EC[n.era]?EC[n.era].accent:"#888";
      ct.beginPath();ct.arc(n.x,n.y,n.r,0,Math.PI*2);ct.fillStyle=col;ct.fill();
    });
    // Labels for connected nodes
    ct.textAlign="center";ct.textBaseline="bottom";
    graphNodes.forEach(n=>{
      if(n.conn>=2||n===hovNode){
        const fs=Math.max(8,Math.min(13,7+n.conn*0.5));
        ct.font=fs+"px 'IBM Plex Mono',monospace";
        ct.fillStyle=isDark?"rgba(255,255,255,"+(n===hovNode?"0.95":"0.55")+")":"rgba(30,20,10,"+(n===hovNode?"0.9":"0.65")+")";
        ct.fillText(n.name,n.x,n.y-n.r-3);
      }
    });
  }

  _graphPaint=paint;
  simulate();

  // Mouse interaction
  const tooltip=document.getElementById("graph-tooltip");

  function findNode(mx,my){
    for(let i=graphNodes.length-1;i>=0;i--){
      const n=graphNodes[i];
      const dx=mx-n.x,dy=my-n.y;
      if(dx*dx+dy*dy<(n.r+4)*(n.r+4))return n;
    }
    return null;
  }

  if(_graphHandlersBound)return;
  _graphHandlersBound=true;

  function getPointerPos(e){
    const r=cv.getBoundingClientRect();
    const touch=e.touches?e.touches[0]:e;
    return{x:touch.clientX-r.left,y:touch.clientY-r.top,cx:touch.clientX,cy:touch.clientY};
  }
  function showTooltipAt(n,cx,cy){
    const pr=cv.parentElement.getBoundingClientRect();
    const ec=EC[n.era]||{accent:"#888"};
    const itm=allFiltered.find(a=>a.item.name===n.name);
    tooltip.style.display="block";
    tooltip.style.borderLeftColor=ec.accent;
    tooltip.style.setProperty('--tip-accent',ec.accent);
    tooltip.innerHTML='<span style="color:'+ec.accent+';font-weight:500">'+esc(n.name)+'</span>'
      +(itm?'<br><span style="font-size:10px;opacity:.7">'+esc(n.era)+' · '+esc(itm.item.period)+'</span>':'');
    tooltip.style.left=(cx-pr.left+10)+"px";
    tooltip.style.top=(cy-pr.top-30)+"px";
    hovNode=n;
  }

  // Mouse events
  cv.onmousedown=e=>{const p=getPointerPos(e);const n=findNode(p.x,p.y);if(n)graphDrag={node:n};};
  cv.onmousemove=e=>{
    const p=getPointerPos(e);
    if(graphDrag){graphDrag.node.x=p.x;graphDrag.node.y=p.y;graphDrag.node.vx=0;graphDrag.node.vy=0;if(_graphPaint)_graphPaint();}
    const n=findNode(p.x,p.y);
    if(n)showTooltipAt(n,p.cx,p.cy);
    else{tooltip.style.display="none";hovNode=null;}
  };
  cv.onmouseup=()=>{graphDrag=null;};
  cv.ondblclick=e=>{
    const p=getPointerPos(e);const n=findNode(p.x,p.y);
    if(n){goToMovement(n.name);}
  };

  // Touch events
  let touchTapNode=null,touchTapTime=0;
  cv.addEventListener("touchstart",e=>{
    e.preventDefault();
    const p=getPointerPos(e);const n=findNode(p.x,p.y);
    if(n){graphDrag={node:n};showTooltipAt(n,p.cx,p.cy);touchTapNode=n;touchTapTime=Date.now();}
    else{touchTapNode=null;}
  },{passive:false});
  cv.addEventListener("touchmove",e=>{
    e.preventDefault();
    const p=getPointerPos(e);
    if(graphDrag){graphDrag.node.x=p.x;graphDrag.node.y=p.y;graphDrag.node.vx=0;graphDrag.node.vy=0;if(_graphPaint)_graphPaint();touchTapNode=null;}
  },{passive:false});
  cv.addEventListener("touchend",e=>{
    if(touchTapNode&&(Date.now()-touchTapTime)<300){
      goToMovement(touchTapNode.name);
    }
    graphDrag=null;touchTapNode=null;
    setTimeout(()=>{tooltip.style.display="none";hovNode=null;},1500);
  });
}

// === MAP VIEW ===
// Map zoom/pan state
let mapVB={x:0,y:0,w:1000,h:500};
let _mapHandlersBound=false;

function drawMap(){
  const svg=document.getElementById("map-svg");
  const tooltip=document.getElementById("map-tooltip");
  const isDark=document.documentElement.getAttribute("data-theme")!=="light";

  function proj(lat,lng){return{x:(lng+180)/360*1000,y:(90-lat)/180*500}}

  // Build SVG content — real map image background
  const mapImgUrl="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Equirectangular-projection.jpg/1280px-Equirectangular-projection.jpg";
  let h='<rect width="1000" height="500" fill="'+(isDark?"#0D1117":"#D8E4EE")+'"/>';
  h+='<image href="'+mapImgUrl+'" x="0" y="0" width="1000" height="500" preserveAspectRatio="none" style="'+(isDark?'filter:brightness(0.35) saturate(0.3)':'filter:brightness(1.05) saturate(0.5) contrast(0.9)')+'"/>';
  // Graticule overlay
  const gStroke=isDark?"rgba(255,255,255,0.08)":"rgba(0,0,0,0.15)";
  for(let lat=-60;lat<=80;lat+=30){const p=proj(lat,-180);h+='<line x1="0" y1="'+p.y+'" x2="1000" y2="'+p.y+'" stroke="'+gStroke+'" stroke-width="0.5" stroke-dasharray="4,4"/>';}
  for(let lng=-150;lng<=180;lng+=30){const p=proj(90,lng);h+='<line x1="'+p.x+'" y1="0" x2="'+p.x+'" y2="500" stroke="'+gStroke+'" stroke-width="0.5" stroke-dasharray="4,4"/>';}

  const items=getFilteredItems();
  items.forEach(({era,item})=>{
    if(!item.geo)return;
    const p=proj(item.geo.lat,item.geo.lng);
    const col=EC[era]?EC[era].accent:"#888";
    const baseR=Math.max(5,Math.min(14,4+item.artists.length*1.5));
    const r=baseR*Math.sqrt(mapVB.w/1000);
    h+='<circle cx="'+p.x+'" cy="'+p.y+'" r="'+r+'" fill="'+col+'" opacity="0.85" style="cursor:pointer" data-name="'+esc(item.name)+'" data-era="'+esc(era)+'" data-period="'+esc(item.period)+'" />';
  });

  const shownEras=new Set(items.map(i=>i.era));
  let ly=470;
  h+='<g font-family="IBM Plex Mono, monospace" font-size="9">';
  D.forEach(e=>{
    if(!shownEras.has(e.era))return;
    const col=EC[e.era].accent;
    h+='<rect x="10" y="'+ly+'" width="8" height="8" rx="2" fill="'+col+'"/>';
    h+='<text x="22" y="'+(ly+7)+'" fill="'+(isDark?"#888":"#4A4238")+'">'+esc(e.era)+'</text>';
    ly-=13;
  });
  h+='</g>';

  svg.innerHTML=h;
  svg.setAttribute("viewBox",mapVB.x+" "+mapVB.y+" "+mapVB.w+" "+mapVB.h);

  // Circle interactivity
  let mapTapTarget=null,mapTapTime=0;
  svg.querySelectorAll("circle").forEach(c=>{
    function showTip(cx,cy){
      const col=c.getAttribute("fill");
      tooltip.style.display="block";
      tooltip.style.borderLeftColor=col;
      tooltip.style.setProperty('--tip-accent',col);
      tooltip.innerHTML='<span style="color:'+col+';font-weight:500">'+c.dataset.name+'</span>'
        +'<br><span style="font-size:10px;opacity:.7">'+c.dataset.era+' · '+c.dataset.period+'</span>';
      const rect=svg.parentElement.getBoundingClientRect();
      tooltip.style.left=(cx-rect.left+10)+"px";
      tooltip.style.top=(cy-rect.top-30)+"px";
    }
    function navTo(){goToMovement(c.dataset.name);}
    c.addEventListener("mouseenter",e=>showTip(e.clientX,e.clientY));
    c.addEventListener("mouseleave",()=>{tooltip.style.display="none"});
    c.addEventListener("click",e=>{if(e.detail===2)navTo();else showTip(e.clientX,e.clientY);});
    c.addEventListener("dblclick",navTo);
    c.addEventListener("touchstart",e=>{
      e.preventDefault();
      const t=e.touches[0];
      showTip(t.clientX,t.clientY);
      if(mapTapTarget===c&&(Date.now()-mapTapTime)<400){navTo();mapTapTarget=null;}
      else{mapTapTarget=c;mapTapTime=Date.now();setTimeout(()=>{tooltip.style.display="none";},2500);}
    },{passive:false});
  });

  // Zoom/Pan handlers (bind once)
  if(!_mapHandlersBound){
    _mapHandlersBound=true;
    let mapDrag=null;
    const mapEl=document.getElementById("map-view");

    // Zoom control buttons
    const zoomCtrl=document.createElement("div");
    zoomCtrl.style.cssText="position:absolute;top:12px;right:12px;display:flex;flex-direction:column;gap:4px;z-index:10";
    ["+","−","↺"].forEach((label,i)=>{
      const btn=document.createElement("button");
      btn.textContent=label;
      btn.style.cssText="width:32px;height:32px;border-radius:4px;border:1px solid var(--filter-border);background:var(--card-bg);color:var(--fg);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace";
      btn.title=i===0?"Zoom in":i===1?"Zoom out":"Reset zoom";
      btn.addEventListener("click",()=>{
        if(i===0)mapZoom(0.8);
        else if(i===1)mapZoom(1.25);
        else{mapVB={x:0,y:0,w:1000,h:500};drawMap();}
      });
      zoomCtrl.appendChild(btn);
    });
    mapEl.appendChild(zoomCtrl);

    function mapZoom(factor,cx,cy){
      if(cx===undefined){cx=mapVB.x+mapVB.w/2;cy=mapVB.y+mapVB.h/2;}
      const nw=Math.max(200,Math.min(1200,mapVB.w*factor));
      const nh=nw/2;
      const ratio=nw/mapVB.w;
      mapVB.x=cx-(cx-mapVB.x)*ratio;
      mapVB.y=cy-(cy-mapVB.y)*ratio;
      mapVB.w=nw;mapVB.h=nh;
      clampVB();
      drawMap();
    }

    function clampVB(){
      if(mapVB.x<-200)mapVB.x=-200;
      if(mapVB.y<-100)mapVB.y=-100;
      if(mapVB.x+mapVB.w>1200)mapVB.x=1200-mapVB.w;
      if(mapVB.y+mapVB.h>600)mapVB.y=600-mapVB.h;
    }

    function svgPoint(clientX,clientY){
      const r=svg.getBoundingClientRect();
      return{x:mapVB.x+(clientX-r.left)/r.width*mapVB.w,y:mapVB.y+(clientY-r.top)/r.height*mapVB.h};
    }

    // Mouse wheel zoom
    svg.addEventListener("wheel",e=>{
      e.preventDefault();
      const pt=svgPoint(e.clientX,e.clientY);
      mapZoom(e.deltaY>0?1.15:0.87,pt.x,pt.y);
    },{passive:false});

    // Mouse drag pan
    svg.addEventListener("mousedown",e=>{
      if(e.target.tagName==="circle")return;
      mapDrag={x:e.clientX,y:e.clientY,vx:mapVB.x,vy:mapVB.y};
      svg.style.cursor="grabbing";
    });
    window.addEventListener("mousemove",e=>{
      if(!mapDrag)return;
      const r=svg.getBoundingClientRect();
      const dx=(e.clientX-mapDrag.x)/r.width*mapVB.w;
      const dy=(e.clientY-mapDrag.y)/r.height*mapVB.h;
      mapVB.x=mapDrag.vx-dx;
      mapVB.y=mapDrag.vy-dy;
      clampVB();
      svg.setAttribute("viewBox",mapVB.x+" "+mapVB.y+" "+mapVB.w+" "+mapVB.h);
    });
    window.addEventListener("mouseup",()=>{mapDrag=null;svg.style.cursor="";});

    // Touch pan + pinch zoom
    let touchPan=null,pinchDist=null;
    svg.addEventListener("touchstart",e=>{
      if(e.target.tagName==="circle")return;
      if(e.touches.length===1){
        touchPan={x:e.touches[0].clientX,y:e.touches[0].clientY,vx:mapVB.x,vy:mapVB.y};
      }else if(e.touches.length===2){
        touchPan=null;
        const dx=e.touches[0].clientX-e.touches[1].clientX;
        const dy=e.touches[0].clientY-e.touches[1].clientY;
        pinchDist=Math.sqrt(dx*dx+dy*dy);
      }
    },{passive:true});
    svg.addEventListener("touchmove",e=>{
      if(e.target.tagName==="circle")return;
      e.preventDefault();
      if(e.touches.length===1&&touchPan){
        const r=svg.getBoundingClientRect();
        const dx=(e.touches[0].clientX-touchPan.x)/r.width*mapVB.w;
        const dy=(e.touches[0].clientY-touchPan.y)/r.height*mapVB.h;
        mapVB.x=touchPan.vx-dx;
        mapVB.y=touchPan.vy-dy;
        clampVB();
        svg.setAttribute("viewBox",mapVB.x+" "+mapVB.y+" "+mapVB.w+" "+mapVB.h);
      }else if(e.touches.length===2&&pinchDist!==null){
        const dx=e.touches[0].clientX-e.touches[1].clientX;
        const dy=e.touches[0].clientY-e.touches[1].clientY;
        const d=Math.sqrt(dx*dx+dy*dy);
        const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
        const cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
        const pt=svgPoint(cx,cy);
        mapZoom(pinchDist/d,pt.x,pt.y);
        pinchDist=d;
      }
    },{passive:false});
    svg.addEventListener("touchend",()=>{touchPan=null;pinchDist=null;});
  }
}

// Onboarding hint
function dismissOnboard(){
  const el=document.getElementById("onboard-hint");
  if(el){el.classList.add("fade-out");setTimeout(()=>el.remove(),400);}
  try{localStorage.setItem("artTimeline_onboarded","1")}catch(e){}
}
(function initOnboard(){
  try{if(localStorage.getItem("artTimeline_onboarded")){const el=document.getElementById("onboard-hint");if(el)el.remove();return;}}catch(e){}
  setTimeout(dismissOnboard,15000);
})();

// Scroll-triggered era reveals
const eraObserver=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add("visible");eraObserver.unobserve(e.target);}});
},{threshold:0.08,rootMargin:"0px 0px -40px 0px"});
function observeEras(){
  document.querySelectorAll(".era:not(.visible)").forEach(el=>eraObserver.observe(el));
}

// Init
render();

// Show mobile drawer button
if(window.innerWidth<900){
  document.getElementById("md-drawer-btn").style.display="flex";
}

// Resize handler for master-detail breakpoint
window.addEventListener('resize',debounce(()=>{
  const isDesktop=window.innerWidth>=900;
  document.getElementById('md-drawer-btn').style.display=isDesktop?'none':'flex';
  if(isDesktop){
    document.getElementById('md-sidebar').classList.remove('open');
    document.getElementById('md-backdrop').style.display='none';
  }
},200));

// Handle hash on load or pick random
(function initHash(){
  const h=window.location.hash.slice(1);
  if(h){
    const found=findBySlug(h);
    if(found){selectMovement(found.era, found.item);return;}
  }
  // No hash — pick a random item
  const items=getAllItems();
  if(items.length){
    const pick=items[Math.floor(Math.random()*items.length)];
    selectMovement(pick.era, pick.item);
  }
})();
</script>
