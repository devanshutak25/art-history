{name:"Greek Art",period:"~800–31 BCE",sort:-800,wiki:w("Ancient_Greek_art"),links:[{l:"Acropolis Museum",u:"https://www.theacropolismuseum.gr/en"}],origin:"Archaic, Classical, Hellenistic. Art shifted from divine service to human idealization.",about:"Contrapposto, mathematical proportion, idealized naturalism. Invented the nude. Architecture codified harmony.",artists:[{n:"Phidias",u:w("Phidias")},{n:"Praxiteles",u:w("Praxiteles")},{n:"Polykleitos",u:w("Polykleitos")},{n:"Myron",u:w("Myron")},{n:"Lysippos",u:w("Lysippos")}],wk:[{t:"Parthenon Marbles (Elgin Marbles)",y:-432,m:"marble relief"},{t:"Venus de Milo",y:-130,m:"marble"}],inf:["Roman Art","Early Renaissance","Neoclassicism"],by:["Egyptian Art","Mesopotamian Art"],cx:[{t:"contrapposto",d:"Pose where figure's weight rests on one leg, creating natural asymmetry"},{t:"Golden Ratio",d:"Mathematical proportion (~1:1.618) believed to underlie aesthetic harmony"},{t:"kouros",d:"Archaic standing male nude figure with left foot forward"}],hx:"The rise of the Greek city-states, Athenian democracy, the Peloponnesian War, and Alexander the Great's conquests spread Hellenistic culture across the Mediterranean and into Asia.",geo:{r:"Athens, Greece",lat:37.97,lng:23.73},tg:["sculpture","architecture","painting","ceramics"]},
{name:"Roman Art",period:"~500 BCE–476 CE",sort:-499,wiki:w("Roman_art"),links:[{l:"Vatican Museums",u:"https://www.museivaticani.va/"},{l:"Pompeii Sites",u:"https://pompeiisites.org/en/"}],origin:"Absorbed Greek aesthetics, redirected toward power, propaganda, engineering.",about:"Veristic portraiture, triumphal arches, mosaics, frescoes. Pantheon, Colosseum, aqueducts.",artists:[{n:"Unknown — Pompeii fresco painters",u:w("Roman_art#Painting")},{n:"Apollodorus of Damascus",u:w("Apollodorus_of_Damascus")}],wk:[{t:"Frescoes of Pompeii (Villa of the Mysteries)",y:-60,m:"fresco"},{t:"Column of Trajan",y:113,m:"marble relief"}],inf:["Byzantine Art","Romanesque Art","Early Renaissance"],by:["Greek Art","Egyptian Art"],cx:[{t:"verism",d:"Hyper-realistic portraiture showing wrinkles and age, emphasizing authority through experience"},{t:"triumphal arch",d:"Freestanding monumental arch celebrating military victories"},{t:"opus sectile",d:"Inlaid stone or marble creating images or geometric patterns on floors and walls"}],hx:"The Roman Republic became an Empire under Augustus. At its height Rome controlled the entire Mediterranean. The eruption of Vesuvius in 79 CE preserved Pompeii's art. The Western Empire fell in 476 CE.",geo:{r:"Rome, Italy",lat:41.9,lng:12.5},tg:["sculpture","architecture","fresco","mosaic","painting"]},
{name:"Gandhara & Mathura Art",period:"~1st c. BCE–5th c. CE",sort:-50,wiki:w("Gandhara_art"),links:[{l:"Metropolitan Museum — Gandhara",u:"https://www.metmuseum.org/toah/hd/ganb/hd_ganb.htm"}],origin:"Gandhara fused Greco-Roman and Indian styles. Mathura developed parallel indigenous Buddhist sculpture. Together created first anthropomorphic Buddha images.",about:"Gandhara: Greco-Roman drapery, Apollo-like Buddha faces. Mathura: sensuous Indian modeling. Defined Buddhist iconography across Asia.",artists:[{n:"Unknown — Gandhara workshop masters",u:w("Gandhara")},{n:"Unknown — Mathura workshop masters",u:w("Mathura_art")}],wk:[{t:"Fasting Buddha of Gandhara",y:200,m:"grey schist"},{t:"Standing Buddha of Mathura",y:430,m:"red sandstone"}],inf:["Indian Classical Art","Southeast Asian Art","Japanese Buddhist Art & Zen Ink Painting"],by:["Greek Art","Indus Valley Art"],cx:[{t:"mudra",d:"Symbolic hand gesture in Buddhist and Hindu iconography"},{t:"ushnisha",d:"Cranial protuberance on Buddha figures symbolizing supreme wisdom"}],hx:"Alexander the Great's conquests brought Greek culture to Central Asia. The Kushan Empire facilitated cultural exchange along the Silk Road, enabling the spread of Buddhist art eastward.",geo:{r:"Gandhara (modern Pakistan/Afghanistan)",lat:34.0,lng:71.5},tg:["sculpture","architecture"]},
{name:"Indian Classical Art",period:"~4th–12th c. CE",sort:320,wiki:w("Indian_art"),links:[{l:"UNESCO — Ajanta Caves",u:"https://whc.unesco.org/en/list/242"},{l:"UNESCO — Ellora Caves",u:"https://whc.unesco.org/en/list/243"}],origin:"Gupta 'Golden Age.' Hindu, Buddhist, Jain temple sculpture reached canonical forms.",about:"Ajanta murals, Ellora cave temples, Chola bronzes (Nataraja), Khajuraho sculpture. Governed by shilpa shastras.",artists:[{n:"Unknown — Ajanta master painters",u:w("Ajanta_Caves")},{n:"Unknown — Chola bronze casters",u:w("Chola_art")},{n:"Unknown — Pallava sculptors",u:w("Pallava_art")}],wk:[{t:"Nataraja (Shiva as Lord of Dance)",y:1000,m:"bronze (lost-wax casting)"},{t:"Ajanta Cave 1 murals",y:480,m:"fresco secco on rock"}],inf:["Southeast Asian Art","Bengal School of Art"],by:["Gandhara & Mathura Art","Indus Valley Art"],cx:[{t:"tribhanga",d:"Triple-bend pose in Indian sculpture creating an S-curve through the body"},{t:"shilpa shastra",d:"Ancient Sanskrit texts prescribing rules for artistic creation and iconography"},{t:"Nataraja",d:"Depiction of Shiva performing the cosmic dance of creation and destruction"}],hx:"The Gupta Empire (320–550 CE) ushered in a golden age of Indian culture. Hindu temple architecture flourished under regional dynasties like the Cholas, Pallavas, and Chalukyas.",geo:{r:"Central India",lat:20.55,lng:75.73},tg:["sculpture","painting","architecture","fresco","metalwork"]},
{name:"Chinese Calligraphy & Painting",period:"~3rd c. BCE–present",sort:-200,wiki:w("Chinese_painting"),links:[{l:"National Palace Museum, Taipei",u:"https://www.npm.gov.tw/en/"}],origin:"Calligraphy as supreme art. Painting from same brush-and-ink materials. Scholar-officials practiced both as moral cultivation.",about:"Six Principles of Xie He. Landscape (shanshui) as highest genre. Literati tradition: spontaneity, personal expression, brush as character.",artists:[{n:"Wang Xizhi",u:w("Wang_Xizhi")},{n:"Gu Kaizhi",u:w("Gu_Kaizhi")},{n:"Fan Kuan",u:w("Fan_Kuan")},{n:"Guo Xi",u:w("Guo_Xi")},{n:"Ma Yuan",u:w("Ma_Yuan_(painter)")},{n:"Ni Zan",u:w("Ni_Zan")},{n:"Dong Qichang",u:w("Dong_Qichang")},{n:"Bada Shanren",u:w("Bada_Shanren")}],wk:[{t:"Travellers Among Mountains and Streams (Fan Kuan)",y:1000,m:"ink and color on silk"},{t:"Preface to the Orchid Pavilion (Wang Xizhi)",y:353,m:"ink on paper (calligraphy)"}],inf:["Japanese Buddhist Art & Zen Ink Painting","Korean Art Traditions","Qing Dynasty Painting"],by:["Chinese Bronze Age Art"],cx:[{t:"shanshui",d:"'Mountain-water' — the Chinese term for landscape painting, the highest genre"},{t:"qi yun",d:"'Spirit resonance' — the first and most important of Xie He's Six Principles"},{t:"literati painting",d:"Amateur scholar-official painting emphasizing personal expression over technical skill"}],hx:"Chinese civilization produced continuous artistic traditions through successive dynasties. The Song dynasty (960–1279) is considered the golden age of Chinese landscape painting.",geo:{r:"China (various capitals)",lat:39.9,lng:116.4},tg:["painting","drawing"]},
{name:"Islamic Art & Architecture",period:"~7th c.–present",sort:650,wiki:w("Islamic_art"),links:[{l:"Metropolitan Museum — Islamic Art",u:"https://www.metmuseum.org/about-the-met/collection-areas/islamic-art"},{l:"Museum of Islamic Art, Doha",u:"https://mia.org.qa/en/"},{l:"Alhambra (official)",u:"https://www.alhambra-patronato.es/en"}],origin:"Aniconism drove extraordinary geometric pattern, calligraphy, and arabesque ornament.",about:"Girih patterns (quasi-crystalline symmetry), calligraphic art, muqarnas, illuminated Qurans, Iznik ceramics.",artists:[{n:"Sinan (architect)",u:w("Mimar_Sinan")},{n:"Unknown — Alhambra designers",u:w("Alhambra")},{n:"Unknown — Iznik potters",u:w("İznik_pottery")}],wk:[{t:"Alhambra Palace (Court of the Lions)",y:1370,m:"stucco, tile, marble"},{t:"Ardabil Carpet",y:1540,m:"silk and wool"}],inf:["Persian Miniature Painting","Mughal Miniature Painting","Art Nouveau"],by:[],cx:[{t:"arabesque",d:"Interlacing plant-based ornamental pattern symbolizing infinite divine creation"},{t:"muqarnas",d:"Honeycomb-like vaulting composed of niche-like cells, a hallmark of Islamic architecture"},{t:"girih",d:"Geometric strap-work patterns using a set of five tile shapes to create complex symmetry"}],hx:"The rapid expansion of Islam from the 7th century created a vast cultural sphere from Spain to Central Asia. The Umayyad, Abbasid, and Ottoman empires fostered diverse artistic traditions.",geo:{r:"Baghdad / Damascus / Istanbul",lat:41.01,lng:28.98},tg:["architecture","ceramics","textile","design","mosaic"]},
{name:"Southeast Asian Art",period:"~6th–15th c. CE",sort:550,wiki:w("Southeast_Asian_arts"),links:[{l:"UNESCO — Angkor",u:"https://whc.unesco.org/en/list/668"},{l:"UNESCO — Borobudur",u:"https://whc.unesco.org/en/list/592"}],origin:"Indian religious art transmitted via trade, transformed into distinctive local traditions.",about:"Angkor Wat, Borobudur, Bagan, Thai Sukhothai walking Buddhas. Synthesis of Indian iconography with local aesthetics.",artists:[{n:"Unknown — Khmer sculptors",u:w("Khmer_art")},{n:"Unknown — Javanese relief carvers",u:w("Borobudur")}],wk:[{t:"Angkor Wat temple complex",y:1150,m:"sandstone architecture"},{t:"Borobudur relief panels",y:800,m:"volcanic stone relief"}],inf:[],by:["Indian Classical Art","Gandhara & Mathura Art"],cx:[{t:"devata",d:"Guardian deity figures carved into Angkor temple walls"},{t:"apsara",d:"Celestial dancer figures prominent in Khmer and Indian art"}],hx:"Maritime trade routes connected India with Southeast Asia, spreading Hinduism and Buddhism. The Khmer Empire built Angkor Wat, the world's largest religious monument, in the 12th century.",geo:{r:"Angkor, Cambodia",lat:13.41,lng:103.87},tg:["sculpture","architecture"]},
{name:"Japanese Buddhist Art & Zen Ink Painting",period:"~6th–16th c.",sort:552,wiki:w("Japanese_art"),links:[{l:"Tokyo National Museum",u:"https://www.tnm.jp/?lang=en"}],origin:"Buddhism via Korea (552 CE). Zen produced ink painting (sumi-e) from Chinese Chan tradition.",about:"Nara: monumental bronzes. Heian: yamato-e. Kamakura: Unkei guardians. Muromachi: Zen ink — minimal brushwork, negative space. Rock gardens.",artists:[{n:"Unkei",u:w("Unkei")},{n:"Sesshū Tōyō",u:w("Sesshū_Tōyō")},{n:"Hasegawa Tōhaku",u:w("Hasegawa_Tōhaku")},{n:"Josetsu",u:w("Josetsu")},{n:"Tenshō Shūbun",u:w("Tenshō_Shūbun")}],wk:[{t:"Splashed Ink Landscape (Sesshū)",y:1495,m:"ink on paper"},{t:"Pine Trees screen (Hasegawa Tōhaku)",y:1595,m:"ink on paper (folding screen)"}],inf:["Ukiyo-e","Nihonga"],by:["Chinese Calligraphy & Painting","Gandhara & Mathura Art"],cx:[{t:"sumi-e",d:"Ink wash painting using black ink in varying concentrations"},{t:"ma",d:"Negative space as an active compositional element in Japanese aesthetics"},{t:"wabi-sabi",d:"Aesthetic of imperfection, impermanence, and incompleteness"}],hx:"Buddhism arrived in Japan from Korea in 552 CE. Successive cultural periods — Nara, Heian, Kamakura, Muromachi — each developed distinctive artistic traditions deeply tied to religious practice.",geo:{r:"Kyoto/Nara, Japan",lat:35.01,lng:135.77},tg:["painting","sculpture","architecture","drawing"]},
{name:"Korean Art Traditions",period:"~57 BCE–present",sort:57,wiki:w("Korean_art"),links:[{l:"National Museum of Korea",u:"https://www.museum.go.kr/site/eng/home"}],origin:"Three Kingdoms, Goryeo, Joseon. Distinctive ceramic, painting, and Buddhist art traditions.",about:"Goryeo celadon, Joseon white porcelain, chaekgeori (bookshelf trompe-l'oeil), minhwa folk painting.",artists:[{n:"Jeong Seon",u:w("Jeong_Seon")},{n:"Kim Hong-do",u:w("Kim_Hong-do")},{n:"Sin Yun-bok",u:w("Sin_Yun-bok")},{n:"Unknown — Goryeo celadon masters",u:w("Korean_celadon")}],wk:[{t:"Celadon incense burner (Goryeo)",y:1150,m:"celadon ceramic"},{t:"Inwangjesaekdo (Jeong Seon)",y:1751,m:"ink on paper"}],inf:[],by:["Chinese Calligraphy & Painting"],cx:[{t:"celadon",d:"Green-glazed ceramic ware perfected by Goryeo potters with jade-like translucency"},{t:"chaekgeori",d:"Trompe-l'oeil painting of bookshelves, popular in Joseon court and folk art"},{t:"minhwa",d:"Korean folk painting featuring tigers, magpies, and auspicious symbols"}],hx:"Korea developed distinctive artistic traditions while absorbing influences from China. The Goryeo dynasty (918–1392) produced world-renowned celadon ceramics, while the Joseon dynasty emphasized Confucian simplicity.",geo:{r:"Seoul, Korea",lat:37.57,lng:126.98},tg:["ceramics","painting","sculpture","drawing"]},
{name:"Persian Miniature Painting",period:"~13th–17th c.",sort:1250,wiki:w("Persian_miniature"),links:[{l:"Metropolitan Museum — Persian Art",u:"https://www.metmuseum.org/toah/hd/pmin/hd_pmin.htm"},{l:"Topkapi Palace Museum",u:"https://topkapisarayi.gov.tr/en"}],origin:"Flourished under Ilkhanids, Timurids, Safavids. Royal manuscript workshops.",about:"Flattened plane, jewel-like color, microscopic detail, gold leaf. Illustrated Shahnamehs. Anti-perspectival — spiritual logic.",artists:[{n:"Behzād",u:w("Kamal_ud-Din_Behzad")},{n:"Reza Abbasi",u:w("Reza_Abbasi")},{n:"Sultan Muhammad",u:w("Sultan_Muhammad_(painter)")},{n:"Mir Sayyid Ali",u:w("Mir_Sayyid_Ali")}],wk:[{t:"Shahnameh of Shah Tahmasp",y:1535,m:"opaque watercolor, ink, gold on paper"},{t:"The Court of Gayumars (Sultan Muhammad)",y:1525,m:"gouache on paper"}],inf:["Mughal Miniature Painting"],by:["Islamic Art & Architecture"],cx:[{t:"Shahnameh",d:"The 'Book of Kings' — Ferdowsi's epic poem, the most illustrated text in Persian art"},{t:"kitab khana",d:"Royal manuscript workshop where painters, calligraphers, and gilders collaborated"}],hx:"The Mongol invasions devastated the Islamic world but created new cultural exchanges. Timurid courts at Herat and Safavid courts at Tabriz and Isfahan became centers of manuscript painting.",geo:{r:"Tabriz/Herat/Isfahan, Persia",lat:32.65,lng:51.68},tg:["painting","drawing"]},
{name:"Mughal Miniature Painting",period:"~1526–1857",sort:1526,wiki:w("Mughal_painting"),links:[{l:"V&A — Mughal India",u:"https://www.vam.ac.uk/collections/south-asia"},{l:"Chester Beatty Library",u:"https://chesterbeatty.ie/"}],origin:"Akbar merged Persian, Indian, European techniques. Imperial atelier with named masters.",about:"Durbar scenes, royal portraits, natural history studies. Synthesis of Persian flatness, Indian color, European chiaroscuro.",artists:[{n:"Basawan",u:w("Basawan")},{n:"Daswanth",u:w("Daswanth")},{n:"Abd al-Samad",u:w("Abd_al-Samad")},{n:"Mansur",u:w("Ustad_Mansur")},{n:"Bichitr",u:w("Bichitr")}],wk:[{t:"Akbarnama illustrations",y:1590,m:"gouache and gold on paper"},{t:"Dodo painting (Mansur)",y:1625,m:"gouache on paper"}],inf:["Bengal School of Art"],by:["Persian Miniature Painting","Indian Classical Art"],cx:[{t:"durbar",d:"Formal court assembly scene, a favored subject of Mughal painting"},{t:"nasta'liq",d:"Calligraphic script style used in Mughal manuscript borders and titles"}],hx:"The Mughal Empire (1526–1857) united much of the Indian subcontinent. Emperor Akbar's court was remarkably cosmopolitan, encouraging artistic synthesis of Persian, Indian, and European traditions.",geo:{r:"Delhi/Agra, India",lat:28.61,lng:77.23},tg:["painting","drawing"]}
]},
{era:"Medieval European",items:[
{name:"Byzantine Art",period:"~330–1453",sort:330,wiki:w("Byzantine_art"),links:[{l:"Hagia Sophia (UNESCO)",u:"https://whc.unesco.org/en/list/356"}],origin:"Eastern Christianity: transcendent, not naturalistic. Icons as spiritual portals.",about:"Gold-ground mosaics, frontal figures, flattened space. Iconoclasm (726–843) nearly destroyed it.",artists:[{n:"Andrei Rublev",u:w("Andrei_Rublev")},{n:"Theophanes the Greek",u:w("Theophanes_the_Greek")}],wk:[{t:"Hagia Sophia mosaics",y:537,m:"glass and gold tesserae mosaic"},{t:"Trinity icon (Andrei Rublev)",y:1411,m:"tempera on wood panel"}],inf:["Romanesque Art","Gothic Art","Insular Art (Hiberno-Saxon)"],by:["Roman Art"],cx:[{t:"iconoclasm",d:"Theological controversy over whether religious images constituted idolatry (726–843 CE)"},{t:"theotokos",d:"'God-bearer' — depictions of the Virgin Mary, a central icon type"},{t:"mandorla",d:"Almond-shaped aureola surrounding holy figures in Byzantine and Romanesque art"}],hx:"After Rome fell in 476 CE, the Eastern Roman Empire (Byzantium) continued for nearly a millennium centered on Constantinople, until its fall to the Ottoman Turks in 1453.",geo:{r:"Constantinople (Istanbul)",lat:41.01,lng:28.98},tg:["mosaic","painting","architecture","fresco"]},
{name:"Insular Art (Hiberno-Saxon)",period:"~600–900 CE",sort:600,wiki:w("Insular_art"),links:[{l:"Trinity College — Book of Kells",u:"https://www.tcd.ie/visitors/book-of-kells/"},{l:"British Library — Lindisfarne Gospels",u:"https://www.bl.uk/collection-items/lindisfarne-gospels"}],origin:"Ireland and Britain. Monastic scriptoria fusing Celtic interlace, Germanic animal ornament, Mediterranean Christianity.",about:"Book of Kells, Lindisfarne Gospels — carpet pages, zoomorphic initials, spiral patterns. Pure ornamental virtuosity.",artists:[{n:"Unknown — Book of Kells scribes",u:w("Book_of_Kells")},{n:"Unknown — Lindisfarne Gospels master",u:w("Lindisfarne_Gospels")}],wk:[{t:"Book of Kells (Chi Rho page)",y:800,m:"ink and pigment on vellum"},{t:"Lindisfarne Gospels carpet page",y:715,m:"ink and pigment on vellum"}],inf:["Romanesque Art"],by:["Byzantine Art"],cx:[{t:"carpet page",d:"Full-page decorative design in illuminated manuscripts, resembling an ornamental carpet"},{t:"interlace",d:"Intertwining bands forming knot patterns, a hallmark of Celtic and Germanic art"}],hx:"Viking raids threatened monastic communities in Ireland and Britain, yet these scriptoria produced some of the most intricate artworks of the entire medieval period.",geo:{r:"Ireland / Northumbria",lat:53.35,lng:-6.26},tg:["drawing","painting","metalwork"]},
{name:"Romanesque Art",period:"~1000–1200",sort:1000,wiki:w("Romanesque_art"),links:[],origin:"First pan-European style after Rome's fall. Monastic orders and Crusades.",about:"Massive stone churches, rounded arches, barrel vaults. Tympanum sculpture. Illuminated manuscripts.",artists:[{n:"Gislebertus",u:w("Gislebertus")},{n:"Master Hugo",u:w("Master_Hugo")},{n:"Hildegard of Bingen",u:w("Hildegard_of_Bingen")}],wk:[{t:"Last Judgment tympanum, Autun Cathedral (Gislebertus)",y:1135,m:"limestone relief"},{t:"Bayeux Tapestry",y:1077,m:"embroidered linen"}],inf:["Gothic Art"],by:["Roman Art","Byzantine Art","Insular Art (Hiberno-Saxon)"],cx:[{t:"tympanum",d:"Semi-circular sculpted area above a church portal depicting religious scenes"},{t:"barrel vault",d:"Continuous arched ceiling forming a tunnel-like structure"}],hx:"The feudal system, monastic reform movements (Cluny, Cîteaux), and the First Crusade (1096) shaped a period of church-building across Europe.",geo:{r:"Burgundy, France",lat:47.04,lng:4.38},tg:["sculpture","architecture","painting","textile"]},
{name:"Gothic Art",period:"~1140–1500",sort:1140,wiki:w("Gothic_art"),links:[{l:"Chartres Cathedral (UNESCO)",u:"https://whc.unesco.org/en/list/81"}],origin:"Abbey of Saint-Denis. Pointed arches, flying buttresses made walls thinner, windows larger.",about:"Stained glass as primary medium. Verticality and light as theology. Giotto bridged Gothic to Renaissance.",artists:[{n:"Giotto di Bondone",u:w("Giotto")},{n:"Simone Martini",u:w("Simone_Martini")},{n:"Duccio",u:w("Duccio")},{n:"Limbourg Brothers",u:w("Limbourg_brothers")},{n:"Claus Sluter",u:w("Claus_Sluter")}],wk:[{t:"Chartres Cathedral stained glass (Blue Virgin)",y:1180,m:"stained glass"},{t:"Scrovegni Chapel frescoes (Giotto)",y:1305,m:"fresco"}],inf:["Early Renaissance","Northern Renaissance"],by:["Romanesque Art","Byzantine Art"],cx:[{t:"flying buttress",d:"External arched support transferring wall thrust to an outer pier, enabling thinner walls and larger windows"},{t:"rayonnant",d:"Phase of Gothic architecture emphasizing radiating tracery in rose windows"},{t:"International Gothic",d:"Elegant, courtly style of painting c. 1375–1425 featuring rich detail and graceful figures"}],hx:"The Gothic era saw the founding of universities, the Black Death (1347–1351), the Hundred Years' War, and an explosion of cathedral construction across Europe.",geo:{r:"Île-de-France, Paris",lat:48.86,lng:2.35},tg:["architecture","sculpture","painting","fresco"]}
]},
{era:"Renaissance & Early Modern",items:[
{name:"Early Renaissance",period:"~1400–1490",sort:1400,wiki:w("Early_Renaissance"),links:[{l:"Uffizi Gallery",u:"https://www.uffizi.it/en"}],origin:"Florence. Medici patronage, Brunelleschi's linear perspective, humanism.",about:"Scientific perspective, anatomical study, classical proportion. Art as intellectual pursuit.",artists:[{n:"Masaccio",u:w("Masaccio")},{n:"Donatello",u:w("Donatello")},{n:"Sandro Botticelli",u:w("Sandro_Botticelli")},{n:"Filippo Brunelleschi",u:w("Filippo_Brunelleschi")},{n:"Fra Angelico",u:w("Fra_Angelico")},{n:"Piero della Francesca",u:w("Piero_della_Francesca")}],wk:[{t:"The Birth of Venus (Botticelli)",y:1485,m:"tempera on canvas"},{t:"David (Donatello)",y:1440,m:"bronze"}],inf:["High Renaissance","Northern Renaissance"],by:["Greek Art","Roman Art","Gothic Art"],cx:[{t:"linear perspective",d:"Mathematical system creating the illusion of depth on a flat surface using vanishing points"},{t:"chiaroscuro",d:"Strong contrast between light and dark to model three-dimensional forms"},{t:"humanism",d:"Intellectual movement emphasizing human reason, classical learning, and individual achievement"}],hx:"The Medici banking family dominated Florence and patronized the arts. The fall of Constantinople (1453) sent Greek scholars west, reviving interest in classical texts and philosophy.",geo:{r:"Florence, Italy",lat:43.77,lng:11.25},tg:["painting","sculpture","architecture","fresco"]},
{name:"High Renaissance",period:"~1490–1527",sort:1490,wiki:w("High_Renaissance"),links:[{l:"Vatican — Sistine Chapel",u:"https://www.museivaticani.va/content/museivaticani/en/collezioni/musei/cappella-sistina.html"}],origin:"Rome/Florence under papal patronage. Technical mastery, classical idealism, individual genius.",about:"Sfumato, pyramidal composition. The artist as universal genius. Sistine Chapel, Last Supper, School of Athens.",artists:[{n:"Leonardo da Vinci",u:w("Leonardo_da_Vinci")},{n:"Michelangelo",u:w("Michelangelo")},{n:"Raphael",u:w("Raphael")},{n:"Titian",u:w("Titian")},{n:"Bramante",u:w("Donato_Bramante")}],wk:[{t:"Mona Lisa (Leonardo)",y:1503,m:"oil on panel"},{t:"Sistine Chapel ceiling (Michelangelo)",y:1512,m:"fresco"}],inf:["Mannerism","Baroque","Neoclassicism"],by:["Early Renaissance","Greek Art"],cx:[{t:"sfumato",d:"Soft, smoky shading with no harsh outlines, perfected by Leonardo da Vinci"},{t:"disegno",d:"Drawing as the intellectual foundation of art, encompassing design and compositional planning"},{t:"terribilità",d:"The quality of awesome grandeur and emotional power, attributed to Michelangelo's work"}],hx:"Pope Julius II commissioned the Sistine Chapel ceiling and the new St. Peter's Basilica. The Sack of Rome in 1527 by Charles V's troops ended the High Renaissance's confident humanism.",geo:{r:"Rome/Florence, Italy",lat:41.9,lng:12.45},tg:["painting","sculpture","architecture","fresco","drawing"]},
{name:"Northern Renaissance",period:"~1430–1580",sort:1430,wiki:w("Northern_Renaissance"),links:[{l:"Rijksmuseum",u:"https://www.rijksmuseum.nl/en"}],origin:"Flanders, Germany, Netherlands. Oil painting innovation, Protestant reformation sensibilities.",about:"Microscopic realism, domestic symbolism, meticulous surface. Printmaking democratized images.",artists:[{n:"Jan van Eyck",u:w("Jan_van_Eyck")},{n:"Albrecht Dürer",u:w("Albrecht_Dürer")},{n:"Hieronymus Bosch",u:w("Hieronymus_Bosch")},{n:"Pieter Bruegel the Elder",u:w("Pieter_Bruegel_the_Elder")},{n:"Hans Holbein the Younger",u:w("Hans_Holbein_the_Younger")},{n:"Rogier van der Weyden",u:w("Rogier_van_der_Weyden")}],wk:[{t:"Ghent Altarpiece (van Eyck)",y:1432,m:"oil on wood panel"},{t:"Melencolia I (Dürer)",y:1514,m:"engraving"}],inf:["Baroque","Realism"],by:["Early Renaissance","Gothic Art"],cx:[{t:"oil glazing",d:"Layering translucent oil paint to build luminous depth and color, pioneered by van Eyck"},{t:"disguised symbolism",d:"Everyday objects carrying hidden religious meaning in Netherlandish painting"},{t:"Weltlandschaft",d:"'World landscape' — panoramic bird's-eye views combining fantasy and observed terrain"}],hx:"The Protestant Reformation (1517) transformed Northern European culture, redirecting art from Catholic altarpieces toward portraiture, still life, and genre scenes. The printing press spread images widely.",geo:{r:"Bruges/Antwerp, Flanders",lat:51.21,lng:3.22},tg:["painting","printmaking","drawing"]},
{name:"Ukiyo-e",period:"~1600s–1900s",sort:1603,wiki:w("Ukiyo-e"),links:[{l:"ukiyo-e.org Search",u:"https://ukiyo-e.org/"}],origin:"Edo-period Japan. 'Floating world' — urban pleasure culture, kabuki, landscape. Mass-produced affordable prints.",about:"Flat color, bold outlines, asymmetric composition, dramatic cropping. Revolutionized Impressionism when they reached Europe (Japonisme).",artists:[{n:"Katsushika Hokusai",u:w("Hokusai")},{n:"Utagawa Hiroshige",u:w("Hiroshige")},{n:"Kitagawa Utamaro",u:w("Utamaro")},{n:"Tōshūsai Sharaku",u:w("Sharaku")},{n:"Suzuki Harunobu",u:w("Suzuki_Harunobu")}],wk:[{t:"The Great Wave off Kanagawa (Hokusai)",y:1831,m:"woodblock print"},{t:"Fifty-three Stations of the Tōkaidō (Hiroshige)",y:1834,m:"woodblock print"}],inf:["Impressionism","Japonisme","Post-Impressionism","Art Nouveau"],by:["Japanese Buddhist Art & Zen Ink Painting"],cx:[{t:"ukiyo",d:"'Floating world' — the transient pleasures of Edo-period urban life"},{t:"nishiki-e",d:"Multi-color woodblock printing technique using multiple carved blocks"}],hx:"The Tokugawa shogunate enforced 250 years of peace and isolation (1603–1868). A vibrant urban culture of theater, fashion, and pleasure quarters emerged, which ukiyo-e depicted.",geo:{r:"Edo (Tokyo), Japan",lat:35.68,lng:139.69},tg:["printmaking","painting","drawing"]},
{name:"Mannerism",period:"~1520–1600",sort:1520,wiki:w("Mannerism"),links:[],origin:"Post-Sack-of-Rome. Deliberate elegance, artificiality, intellectual complexity.",about:"Elongated figures, acid colors, ambiguous narratives. Style (maniera) over substance. Now recognized as proto-modern.",artists:[{n:"Parmigianino",u:w("Parmigianino")},{n:"Pontormo",u:w("Pontormo")},{n:"El Greco",u:w("El_Greco")},{n:"Tintoretto",u:w("Tintoretto")},{n:"Bronzino",u:w("Bronzino")},{n:"Benvenuto Cellini",u:w("Benvenuto_Cellini")}],wk:[{t:"Madonna with the Long Neck (Parmigianino)",y:1540,m:"oil on panel"},{t:"The Burial of the Count of Orgaz (El Greco)",y:1588,m:"oil on canvas"}],inf:["Baroque"],by:["High Renaissance"],cx:[{t:"maniera",d:"Stylishness and virtuosity valued for their own sake, prioritizing elegance over naturalism"},{t:"figura serpentinata",d:"Spiraling, flame-like figure composition creating dynamic tension"},{t:"capriccio",d:"Fantastical architectural scene combining real and imagined elements"}],hx:"The Sack of Rome (1527) and the Counter-Reformation created a climate of anxiety and spiritual uncertainty that replaced High Renaissance confidence with ambiguity and artifice.",geo:{r:"Rome/Florence, Italy",lat:43.77,lng:11.25},tg:["painting","sculpture","architecture"]},
{name:"Baroque",period:"~1600–1750",sort:1600,wiki:w("Baroque"),links:[{l:"Museo del Prado",u:"https://www.museodelprado.es/en"}],origin:"Counter-Reformation art for emotional persuasion. Adopted by absolutist monarchies.",about:"Dramatic chiaroscuro, diagonal compositions, theatrical emotion, illusionistic ceilings, monumental scale.",artists:[{n:"Caravaggio",u:w("Caravaggio")},{n:"Peter Paul Rubens",u:w("Peter_Paul_Rubens")},{n:"Gian Lorenzo Bernini",u:w("Gian_Lorenzo_Bernini")},{n:"Rembrandt",u:w("Rembrandt")},{n:"Diego Velázquez",u:w("Diego_Velázquez")},{n:"Johannes Vermeer",u:w("Johannes_Vermeer")},{n:"Artemisia Gentileschi",u:w("Artemisia_Gentileschi")}],wk:[{t:"The Calling of Saint Matthew (Caravaggio)",y:1600,m:"oil on canvas"},{t:"Ecstasy of Saint Teresa (Bernini)",y:1652,m:"marble and gilt bronze"}],inf:["Rococo","Romanticism","Neoclassicism"],by:["High Renaissance","Mannerism","Northern Renaissance"],cx:[{t:"tenebrism",d:"Extreme chiaroscuro with large dark areas and dramatic spotlight illumination"},{t:"quadratura",d:"Illusionistic ceiling painting creating the appearance of open sky or architecture"},{t:"bel composto",d:"Bernini's concept of unifying architecture, sculpture, and painting into a total artwork"}],hx:"The Counter-Reformation, the Thirty Years' War (1618–1648), and the rise of absolute monarchies like Louis XIV's France created demand for grand, persuasive, emotionally overwhelming art.",geo:{r:"Rome, Italy / Amsterdam",lat:41.9,lng:12.5},tg:["painting","sculpture","architecture","fresco"]},
{name:"Qing Dynasty Painting",period:"~1644–1912",sort:1644,wiki:w("Qing_dynasty_painting"),links:[{l:"National Palace Museum",u:"https://www.npm.gov.tw/en/"}],origin:"Continued Chinese painting, incorporated European perspective via Jesuits.",about:"Orthodox landscape school vs. individualists (Bada Shanren, Shitao). Castiglione fused European/Chinese formats.",artists:[{n:"Bada Shanren",u:w("Bada_Shanren")},{n:"Shitao",u:w("Shitao")},{n:"Giuseppe Castiglione",u:w("Giuseppe_Castiglione_(Jesuit_painter)")},{n:"Wang Hui",u:w("Wang_Hui_(Qing_dynasty)")},{n:"Zheng Xie",u:w("Zheng_Xie")}],wk:[{t:"One Hundred Horses (Castiglione)",y:1728,m:"ink and color on silk"},{t:"Fish and Rocks (Bada Shanren)",y:1694,m:"ink on paper"}],inf:[],by:["Chinese Calligraphy & Painting"],cx:[{t:"Orthodox school",d:"Qing painters following the lineage of Dong Qichang's literati landscape tradition"},{t:"Individualists",d:"Qing painters like Bada Shanren and Shitao who broke conventions for personal expression"}],hx:"The Manchu Qing dynasty (1644–1912) was China's last imperial dynasty. Jesuit missionaries introduced European artistic techniques, while internal tensions eventually led to the dynasty's collapse.",geo:{r:"Beijing, China",lat:39.9,lng:116.4},tg:["painting","drawing"]},
{name:"Rococo",period:"~1720–1780",sort:1720,wiki:w("Rococo"),links:[{l:"Wallace Collection",u:"https://www.wallacecollection.org/"}],origin:"French aristocratic reaction against Baroque heaviness. Art into salons and boudoirs.",about:"Pastel palette, asymmetrical ornament, fêtes galantes, erotic undertones, decorative excess.",artists:[{n:"Jean-Antoine Watteau",u:w("Antoine_Watteau")},{n:"François Boucher",u:w("François_Boucher")},{n:"Jean-Honoré Fragonard",u:w("Jean-Honoré_Fragonard")},{n:"Giovanni Battista Tiepolo",u:w("Giovanni_Battista_Tiepolo")}],wk:[{t:"The Swing (Fragonard)",y:1767,m:"oil on canvas"},{t:"Pilgrimage to Cythera (Watteau)",y:1717,m:"oil on canvas"}],inf:["Neoclassicism"],by:["Baroque"],cx:[{t:"fête galante",d:"Scene of elegant figures at leisure in a parkland setting, invented by Watteau"},{t:"rocaille",d:"Shell-like ornamental motifs with asymmetric curves that give Rococo its name"},{t:"boudoir painting",d:"Intimate, often erotic painting for private aristocratic spaces"}],hx:"The French aristocracy indulged in luxury before the Revolution. Madame de Pompadour patronized Boucher. Rococo spread across Europe before the Enlightenment's call for reason swept it away.",geo:{r:"Paris, France",lat:48.86,lng:2.35},tg:["painting","architecture","sculpture","design"]}
]},
{era:"18th–19th Century",items:[
{name:"Neoclassicism",period:"~1760–1850",sort:1760,wiki:w("Neoclassicism"),links:[{l:"Louvre",u:"https://www.louvre.fr/en"}],origin:"Pompeii excavations + Enlightenment rationalism. Revolutionary France's visual language.",about:"Classical clarity, linear precision, moral narrative. Rejection of Rococo frivolity.",artists:[{n:"Jacques-Louis David",u:w("Jacques-Louis_David")},{n:"Jean-Auguste-Dominique Ingres",u:w("Jean-Auguste-Dominique_Ingres")},{n:"Antonio Canova",u:w("Antonio_Canova")},{n:"Angelica Kauffman",u:w("Angelica_Kauffman")}],wk:[{t:"Oath of the Horatii (David)",y:1784,m:"oil on canvas"},{t:"Psyche Revived by Cupid's Kiss (Canova)",y:1793,m:"marble"}],inf:["Romanticism","Realism"],by:["Greek Art","Roman Art","High Renaissance","Rococo"],cx:[{t:"history painting",d:"The highest genre in academic hierarchy, depicting morally uplifting scenes from history or mythology"},{t:"beau idéal",d:"Concept of perfected, idealized beauty derived from classical sculpture"}],hx:"The excavation of Pompeii and Herculaneum (1738–1748), the Enlightenment, the American Revolution (1776), and the French Revolution (1789) all fueled a return to classical civic virtue.",geo:{r:"Paris, France / Rome",lat:48.86,lng:2.35},tg:["painting","sculpture","architecture"]},
{name:"Romanticism",period:"~1780–1850",sort:1780,wiki:w("Romanticism"),links:[{l:"Tate — Romantics",u:"https://www.tate.org.uk/art/art-terms/r/romanticism"}],origin:"Reaction against Enlightenment rationalism. Emotion, imagination, the sublime.",about:"Dramatic landscapes, ruins, storms. The artist as tormented genius. Subjectivity over objectivity.",artists:[{n:"Eugène Delacroix",u:w("Eugène_Delacroix")},{n:"Caspar David Friedrich",u:w("Caspar_David_Friedrich")},{n:"J.M.W. Turner",u:w("J._M._W._Turner")},{n:"Francisco Goya",u:w("Francisco_Goya")},{n:"William Blake",u:w("William_Blake")},{n:"Théodore Géricault",u:w("Théodore_Géricault")},{n:"John Constable",u:w("John_Constable")}],wk:[{t:"Wanderer above the Sea of Fog (Friedrich)",y:1818,m:"oil on canvas"},{t:"Liberty Leading the People (Delacroix)",y:1830,m:"oil on canvas"}],inf:["Realism","Pre-Raphaelite Brotherhood","Symbolism","Impressionism"],by:["Neoclassicism","Baroque"],cx:[{t:"the sublime",d:"Overwhelming experience of nature's vastness and power, producing awe mixed with terror"},{t:"Sturm und Drang",d:"'Storm and stress' — German proto-Romantic literary movement emphasizing emotion and individualism"},{t:"pittoresque",d:"Aesthetic quality between the beautiful and the sublime, found in irregular landscapes"}],hx:"The Napoleonic Wars, the industrial revolution, and the rise of nationalism across Europe. Poets like Byron and Shelley embodied the Romantic ideal of the passionate, rebellious individual.",geo:{r:"Paris / London / Dresden",lat:48.86,lng:2.35},tg:["painting","drawing","printmaking"]},
{name:"Realism",period:"~1840–1880",sort:1840,wiki:w("Realism_(arts)"),links:[{l:"Musée d'Orsay",u:"https://www.musee-orsay.fr/en"}],origin:"Courbet: art should depict the visible world as it is. Class consciousness.",about:"Working-class subjects, unflinching observation. Photography pushed painters toward documentary honesty.",artists:[{n:"Gustave Courbet",u:w("Gustave_Courbet")},{n:"Jean-François Millet",u:w("Jean-François_Millet")},{n:"Honoré Daumier",u:w("Honoré_Daumier")},{n:"Ilya Repin",u:w("Ilya_Repin")},{n:"Thomas Eakins",u:w("Thomas_Eakins")},{n:"Rosa Bonheur",u:w("Rosa_Bonheur")}],wk:[{t:"A Burial at Ornans (Courbet)",y:1850,m:"oil on canvas"},{t:"The Gleaners (Millet)",y:1857,m:"oil on canvas"}],inf:["Impressionism","Naturalism"],by:["Romanticism","Neoclassicism","Northern Renaissance"],cx:[{t:"plein air",d:"Painting outdoors directly from nature rather than in a studio"},{t:"social realism",d:"Art depicting the conditions of the working class and social inequalities"}],hx:"The 1848 revolutions across Europe, the rise of industrial capitalism, and the invention of photography (1839) transformed both society and the purpose of visual art.",geo:{r:"Paris, France",lat:48.86,lng:2.35},tg:["painting","sculpture","drawing"]},
{name:"Pre-Raphaelite Brotherhood",period:"~1848–1860s",sort:1848,wiki:w("Pre-Raphaelite_Brotherhood"),links:[{l:"Tate — Pre-Raphaelites",u:"https://www.tate.org.uk/art/art-terms/p/pre-raphaelite"}],origin:"Seven English artists rejected Royal Academy conventions.",about:"Hyper-detailed naturalism, jewel-tone color, literary/mythological subjects, medieval revivalism.",artists:[{n:"Dante Gabriel Rossetti",u:w("Dante_Gabriel_Rossetti")},{n:"John Everett Millais",u:w("John_Everett_Millais")},{n:"William Holman Hunt",u:w("William_Holman_Hunt")},{n:"Edward Burne-Jones",u:w("Edward_Burne-Jones")},{n:"William Morris",u:w("William_Morris")}],wk:[{t:"Ophelia (Millais)",y:1852,m:"oil on canvas"},{t:"Beata Beatrix (Rossetti)",y:1870,m:"oil on canvas"}],inf:["Arts and Crafts","Symbolism","Art Nouveau"],by:["Romanticism","Gothic Art"],cx:[{t:"truth to nature",d:"Painting every detail directly from observation, rejecting academic idealization"},{t:"medievalism",d:"Artistic and philosophical interest in the culture and aesthetics of the Middle Ages"}],hx:"Victorian England was at the height of its imperial power and industrial revolution. The PRB reacted against what they saw as the soulless mechanical production of the Royal Academy.",geo:{r:"London, England",lat:51.51,lng:-0.12},tg:["painting","drawing","textile","design"]},
{name:"Impressionism",period:"~1860–1886",sort:1860,wiki:w("Impressionism"),links:[{l:"Musée de l'Orangerie",u:"https://www.musee-orangerie.fr/en"},{l:"Musée Marmottan Monet",u:"https://www.marmottan.fr/en/"}],origin:"Paris. Rejected Salon system. Monet's 'Impression, Sunrise' (1872) named it.",about:"Visible brushstrokes, light as subject, everyday scenes. Dissolved form into atmosphere.",artists:[{n:"Claude Monet",u:w("Claude_Monet")},{n:"Pierre-Auguste Renoir",u:w("Pierre-Auguste_Renoir")},{n:"Edgar Degas",u:w("Edgar_Degas")},{n:"Camille Pissarro",u:w("Camille_Pissarro")},{n:"Berthe Morisot",u:w("Berthe_Morisot")},{n:"Alfred Sisley",u:w("Alfred_Sisley")},{n:"Mary Cassatt",u:w("Mary_Cassatt")}],wk:[{t:"Impression, Sunrise (Monet)",y:1872,m:"oil on canvas"},{t:"Dance at Le moulin de la Galette (Renoir)",y:1876,m:"oil on canvas"}],inf:["Post-Impressionism","Fauvism","Japonisme"],by:["Realism","Romanticism","Ukiyo-e"],cx:[{t:"en plein air",d:"Painting outdoors to capture the transient effects of natural light"},{t:"broken color",d:"Placing separate dabs of color side by side rather than blending on the palette"},{t:"Salon des Refusés",d:"1863 exhibition of works rejected by the official Salon, a milestone in modern art's independence"}],hx:"Haussmann's renovation of Paris, the Franco-Prussian War (1870–71), and the Paris Commune. The invention of paint tubes allowed artists to paint outdoors easily for the first time.",geo:{r:"Paris, France",lat:48.86,lng:2.35},tg:["painting"]},
{name:"Bengal School of Art",period:"~1860s–1940s",sort:1864,wiki:w("Bengal_School_of_Art"),links:[{l:"NGMA Delhi",u:"https://ngmaindia.gov.in/"}],origin:"Indian nationalist response to British colonial art education. Abanindranath Tagore rejected Western realism.",about:"Soft washes, mythological/nationalist subjects, rejection of Western oil painting. Art as anticolonial resistance.",artists:[{n:"Abanindranath Tagore",u:w("Abanindranath_Tagore")},{n:"Nandalal Bose",u:w("Nandalal_Bose")},{n:"Jamini Roy",u:w("Jamini_Roy")},{n:"Rabindranath Tagore",u:w("Rabindranath_Tagore")},{n:"Amrita Sher-Gil",u:w("Amrita_Sher-Gil")}],wk:[{t:"Bharat Mata (Abanindranath Tagore)",y:1905,m:"watercolor on paper"},{t:"Banyan Tree (Nandalal Bose)",y:1935,m:"ink and tempera on paper"}],inf:[],by:["Indian Classical Art","Mughal Miniature Painting"],cx:[{t:"swadeshi",d:"'Of one's own country' — movement advocating Indian self-sufficiency including indigenous art"},{t:"wash technique",d:"Transparent watercolor technique favored over Western oil painting as an Indian alternative"}],hx:"The Indian independence movement gained momentum against British colonial rule. The Bengal Renaissance brought cultural and intellectual revitalization to Calcutta.",geo:{r:"Calcutta (Kolkata), India",lat:22.57,lng:88.36},tg:["painting","drawing"]},
{name:"Arts and Crafts",period:"~1860–1910",sort:1861,wiki:w("Arts_and_Crafts_movement"),links:[{l:"V&A — Arts & Crafts",u:"https://www.vam.ac.uk/collections/arts-and-crafts"}],origin:"William Morris against industrial mass production. Handcraft, honest materials.",about:"Wallpapers, textiles, furniture, typography. Spawned Art Nouveau, influenced Bauhaus.",artists:[{n:"William Morris",u:w("William_Morris")},{n:"Charles Rennie Mackintosh",u:w("Charles_Rennie_Mackintosh")},{n:"C.R. Ashbee",u:w("Charles_Robert_Ashbee")},{n:"Walter Crane",u:w("Walter_Crane")},{n:"Gustav Stickley",u:w("Gustav_Stickley")}],wk:[{t:"Strawberry Thief (Morris)",y:1883,m:"indigo-discharged cotton textile"},{t:"Sussex chair (Morris & Co.)",y:1865,m:"ebonized beech and rush"}],inf:["Art Nouveau","Bauhaus"],by:["Pre-Raphaelite Brotherhood"],cx:[{t:"Gesamtkunstwerk",d:"Total work of art — designing every element of an environment in a unified aesthetic"},{t:"truth to materials",d:"Principle that materials should be used honestly, not disguised or artificially embellished"}],hx:"The industrial revolution had transformed manufacturing and labor. Morris and Ruskin advocated for a return to handcraft as both aesthetic and social reform.",geo:{r:"London, England",lat:51.51,lng:-0.12},tg:["design","textile","architecture","painting"]},
{name:"Japonisme",period:"~1860s–1910s",sort:1862,wiki:w("Japonisme"),links:[],origin:"Japanese goods flooded Europe after Perry forced Japan open (1853). Transformative impact.",about:"Flat color, asymmetric composition, decorative patterning adopted by Western artists.",artists:[{n:"James McNeill Whistler",u:w("James_Abbott_McNeill_Whistler")},{n:"Edgar Degas",u:w("Edgar_Degas")},{n:"Vincent van Gogh",u:w("Vincent_van_Gogh")},{n:"Mary Cassatt",u:w("Mary_Cassatt")}],wk:[{t:"Nocturne in Blue and Gold (Whistler)",y:1875,m:"oil on canvas"},{t:"Japonaiserie: Flowering Plum Tree (van Gogh after Hiroshige)",y:1887,m:"oil on canvas"}],inf:["Art Nouveau","Impressionism"],by:["Ukiyo-e"],cx:[{t:"Japonisme",d:"Western craze for Japanese art and design after Japan opened to trade in the 1850s"},{t:"asymmetric composition",d:"Off-center placement of subjects influenced by Japanese woodblock prints"}],hx:"Commodore Perry's forced opening of Japan (1853) ended two centuries of isolation. Japanese goods exhibited at world's fairs captivated European artists and collectors.",geo:{r:"Paris, France",lat:48.86,lng:2.35},tg:["painting","printmaking","design"]},
{name:"Symbolism",period:"~1880–1910",sort:1880,wiki:w("Symbolism_(arts)"),links:[],origin:"Literary movement migrated to visual art. Anti-Realist — indirect symbolic imagery.",about:"Dreams, mythology, the occult, death, desire. Influenced Expressionism and Surrealism.",artists:[{n:"Gustave Moreau",u:w("Gustave_Moreau")},{n:"Odilon Redon",u:w("Odilon_Redon")},{n:"Gustav Klimt",u:w("Gustav_Klimt")},{n:"Edvard Munch",u:w("Edvard_Munch")},{n:"Fernand Khnopff",u:w("Fernand_Khnopff")},{n:"Arnold Böcklin",u:w("Arnold_Böcklin")}],wk:[{t:"The Scream (Munch)",y:1893,m:"tempera and crayon on cardboard"},{t:"Isle of the Dead (Böcklin)",y:1880,m:"oil on canvas"}],inf:["Expressionism","Surrealism","Vienna Secession"],by:["Romanticism","Pre-Raphaelite Brotherhood"],cx:[{t:"synesthesia",d:"Blending of senses — using visual art to evoke sounds, textures, or emotions"},{t:"correspondences",d:"Baudelaire's idea that sensory experiences mirror hidden spiritual realities"}],hx:"The Decadent movement, Nietzsche's philosophy, Freud's early psychoanalysis, and a fin-de-siècle mood of anxiety and spiritual searching pervaded European culture.",geo:{r:"Paris / Brussels / Vienna",lat:48.86,lng:2.35},tg:["painting","drawing","printmaking"]},
{name:"Tonalism",period:"~1880–1915",sort:1882,wiki:w("Tonalism"),links:[],origin:"American landscape painters seeking atmospheric mood over detail.",about:"Muted palettes, soft-focus landscapes, nocturnes, contemplative. Prefigured aspects of abstraction.",artists:[{n:"James McNeill Whistler",u:w("James_Abbott_McNeill_Whistler")},{n:"George Inness",u:w("George_Inness")},{n:"Dwight Tryon",u:w("Dwight_William_Tryon")},{n:"Thomas Dewing",u:w("Thomas_Dewing")}],wk:[{t:"Nocturne: Blue and Silver — Chelsea (Whistler)",y:1871,m:"oil on canvas"},{t:"The Home of the Heron (Inness)",y:1893,m:"oil on canvas"}],inf:["Color Field Painting"],by:["Impressionism","Romanticism"],cx:[{t:"tonal harmony",d:"Unified color atmosphere achieved by keying all hues to a single dominant tone"},{t:"nocturne",d:"Whistler's term for night-scene paintings emphasizing mood over narrative"}],hx:"The Gilded Age in America, rapid industrialization, and growing nostalgia for pastoral landscapes. Whistler's famous libel trial against Ruskin (1878) debated art's purpose.",geo:{r:"New York / Boston, USA",lat:40.71,lng:-74.01},tg:["painting"]},
{name:"Post-Impressionism",period:"~1886–1905",sort:1886,wiki:w("Post-Impressionism"),links:[{l:"Musée d'Orsay",u:"https://www.musee-orsay.fr/en"}],origin:"Rejection of Impressionism's limitations. Each artist took a different direction.",about:"Cézanne → structure; Seurat → Pointillism; Van Gogh → expressive color; Gauguin → Synthetism.",artists:[{n:"Paul Cézanne",u:w("Paul_Cézanne")},{n:"Vincent van Gogh",u:w("Vincent_van_Gogh")},{n:"Paul Gauguin",u:w("Paul_Gauguin")},{n:"Georges Seurat",u:w("Georges_Seurat")},{n:"Henri de Toulouse-Lautrec",u:w("Henri_de_Toulouse-Lautrec")},{n:"Paul Signac",u:w("Paul_Signac")}],wk:[{t:"The Starry Night (van Gogh)",y:1889,m:"oil on canvas"},{t:"A Sunday Afternoon on the Island of La Grande Jatte (Seurat)",y:1886,m:"oil on canvas"}],inf:["Fauvism","Cubism","Expressionism","Orphism"],by:["Impressionism","Ukiyo-e"],cx:[{t:"Pointillism",d:"Technique of applying small dots of pure color that optically blend when viewed from a distance"},{t:"Cloisonnism",d:"Style using bold outlines filled with flat color areas, inspired by stained glass and Japanese prints"},{t:"passage",d:"Cézanne's technique of merging adjacent planes through shared color to unify surface and depth"}],hx:"The Belle Époque in Paris, the Dreyfus Affair, the construction of the Eiffel Tower (1889), and the spread of electric lighting transformed urban life and visual experience.",geo:{r:"Paris / Provence, France",lat:48.86,lng:2.35},tg:["painting","drawing","printmaking"]},
{name:"Art Nouveau",period:"~1890–1910",sort:1890,wiki:w("Art_Nouveau"),links:[{l:"Musée Horta, Brussels",u:"https://www.hortamuseum.be/en"}],origin:"International decorative style. Total design — architecture to jewelry.",about:"Organic sinuous lines, whiplash curves. Jugendstil, Secessionism, Modernisme.",artists:[{n:"Alphonse Mucha",u:w("Alphonse_Mucha")},{n:"Gustav Klimt",u:w("Gustav_Klimt")},{n:"Antoni Gaudí",u:w("Antoni_Gaudí")},{n:"Aubrey Beardsley",u:w("Aubrey_Beardsley")},{n:"Louis Comfort Tiffany",u:w("Louis_Comfort_Tiffany")},{n:"Hector Guimard",u:w("Hector_Guimard")},{n:"Victor Horta",u:w("Victor_Horta")}],wk:[{t:"The Kiss (Klimt)",y:1908,m:"oil and gold leaf on canvas"},{t:"Casa Batlló (Gaudí)",y:1906,m:"stone, ceramic, glass architecture"}],inf:["Vienna Secession","Art Deco","Bauhaus"],by:["Arts and Crafts","Japonisme","Pre-Raphaelite Brotherhood","Ukiyo-e"],cx:[{t:"whiplash curve",d:"Sinuous, asymmetric S-curve that became Art Nouveau's signature motif"},{t:"Jugendstil",d:"German/Austrian term for Art Nouveau, named after the magazine 'Jugend' (Youth)"},{t:"horror vacui",d:"Filling every available surface with ornament — a tendency in Art Nouveau decoration"}],hx:"The Paris Exposition Universelle of 1900 showcased Art Nouveau to the world. Growing middle classes demanded beautiful everyday objects, from metro stations to lamp fittings.",geo:{r:"Brussels / Paris / Barcelona",lat:50.85,lng:4.35},tg:["architecture","design","painting","sculpture","printmaking"]},
{name:"Vienna Secession",period:"~1897–1905",sort:1897,wiki:w("Vienna_Secession"),links:[{l:"Secession Building",u:"https://www.secession.at/en/"}],origin:"Klimt broke from conservative establishment. 'To every age its art, to art its freedom.'",about:"Art Nouveau ornament + Symbolist content + proto-modern geometry. Wiener Werkstätte: total art.",artists:[{n:"Gustav Klimt",u:w("Gustav_Klimt")},{n:"Egon Schiele",u:w("Egon_Schiele")},{n:"Koloman Moser",u:w("Koloman_Moser")},{n:"Josef Hoffmann",u:w("Josef_Hoffmann")},{n:"Joseph Maria Olbrich",u:w("Joseph_Maria_Olbrich")}],wk:[{t:"Beethoven Frieze (Klimt)",y:1902,m:"gold leaf, paint on stucco"},{t:"Self-Portrait with Physalis (Schiele)",y:1912,m:"oil and gouache on wood"}],inf:["Expressionism","Bauhaus"],by:["Art Nouveau","Symbolism"],cx:[{t:"Wiener Werkstätte",d:"'Vienna Workshop' — collective producing unified decorative arts from furniture to fashion"},{t:"Ver Sacrum",d:"The Secession's official magazine, a landmark in graphic design and typography"}],hx:"Turn-of-the-century Vienna was a crucible of modernism — Freud, Mahler, Wittgenstein, and Klimt all worked within the same milieu of cultural innovation and imperial decline.",geo:{r:"Vienna, Austria",lat:48.2,lng:16.37},tg:["painting","architecture","design","drawing"]}
]},
{era:"Early 20th Century Avant-Garde",items:[
{name:"Fauvism",period:"~1905–1908",sort:1905,wiki:w("Fauvism"),links:[{l:"Centre Pompidou",u:"https://www.centrepompidou.fr/en"}],origin:"1905 Salon d'Automne. 'Les fauves.' Liberated color from descriptive function.",about:"Arbitrary explosive color, simplified forms. Matisse as center.",artists:[{n:"Henri Matisse",u:w("Henri_Matisse")},{n:"André Derain",u:w("André_Derain")},{n:"Maurice de Vlaminck",u:w("Maurice_de_Vlaminck")},{n:"Raoul Dufy",u:w("Raoul_Dufy")},{n:"Kees van Dongen",u:w("Kees_van_Dongen")}],wk:[{t:"Woman with a Hat (Matisse)",y:1905,m:"oil on canvas"},{t:"The Turning Road, L'Estaque (Derain)",y:1906,m:"oil on canvas"}],inf:["Expressionism","Abstract Expressionism"],by:["Post-Impressionism","Impressionism"],cx:[{t:"arbitrary color",d:"Using color for emotional or compositional effect rather than to describe observed reality"},{t:"les fauves",d:"'The wild beasts' — derisive label given by critic Louis Vauxcelles at the 1905 Salon"}],hx:"Einstein published special relativity (1905). The French colonial empire was at its height. Paris was the undisputed capital of the art world.",geo:{r:"Paris, France",lat:48.86,lng:2.35},tg:["painting"]},
{name:"Expressionism",period:"~1905–1930s",sort:1906,wiki:w("Expressionism"),links:[{l:"Brücke Museum",u:"https://www.bruecke-museum.de/en/"},{l:"Lenbachhaus — Blaue Reiter",u:"https://www.lenbachhaus.de/en"}],origin:"Die Brücke (1905), Der Blaue Reiter (1911). Nietzsche, Freud, WWI anxiety.",about:"Distorted form, aggressive color, psychological intensity. Woodcut revival. Extended into film, theater.",artists:[{n:"Ernst Ludwig Kirchner",u:w("Ernst_Ludwig_Kirchner")},{n:"Edvard Munch",u:w("Edvard_Munch")},{n:"Egon Schiele",u:w("Egon_Schiele")},{n:"Wassily Kandinsky",u:w("Wassily_Kandinsky")},{n:"Franz Marc",u:w("Franz_Marc")},{n:"Emil Nolde",u:w("Emil_Nolde")},{n:"Oskar Kokoschka",u:w("Oskar_Kokoschka")},{n:"Max Beckmann",u:w("Max_Beckmann")},{n:"Käthe Kollwitz",u:w("Käthe_Kollwitz")}],wk:[{t:"Der Blaue Reiter almanac cover (Kandinsky)",y:1912,m:"woodcut print"},{t:"Street, Berlin (Kirchner)",y:1913,m:"oil on canvas"}],inf:["Abstract Expressionism","Neo-Expressionism","Surrealism"],by:["Post-Impressionism","Symbolism","African Classical Art Traditions","Fauvism","Vienna Secession"],cx:[{t:"Die Brücke",d:"'The Bridge' — Expressionist group in Dresden (1905) seeking raw, anti-bourgeois art"},{t:"Der Blaue Reiter",d:"'The Blue Rider' — Munich group (1911) exploring spiritual dimensions of abstraction"},{t:"Angst",d:"Deep existential anxiety expressed through distorted form and aggressive color"}],hx:"The build-up to World War I, Freud's theories of the unconscious, and Nietzsche's philosophy created a climate of cultural anxiety and radical questioning in Germany and Austria.",geo:{r:"Dresden/Munich, Germany",lat:51.05,lng:13.74},tg:["painting","printmaking","sculpture","drawing"]},
{name:"Cubism",period:"~1907–1920s",sort:1907,wiki:w("Cubism"),links:[{l:"Musée Picasso",u:"https://www.museepicassoparis.fr/en"}],origin:"Picasso's 'Les Demoiselles d'Avignon' (1907). Most revolutionary formal invention since perspective.",about:"Multiple viewpoints, fragmented planes. Analytic → Synthetic. Destroyed single-point perspective.",artists:[{n:"Pablo Picasso",u:w("Pablo_Picasso")},{n:"Georges Braque",u:w("Georges_Braque")},{n:"Juan Gris",u:w("Juan_Gris")},{n:"Fernand Léger",u:w("Fernand_Léger")},{n:"Robert Delaunay",u:w("Robert_Delaunay")},{n:"Albert Gleizes",u:w("Albert_Gleizes")}],wk:[{t:"Les Demoiselles d'Avignon (Picasso)",y:1907,m:"oil on canvas"},{t:"Violin and Candlestick (Braque)",y:1910,m:"oil on canvas"}],inf:["Futurism","Orphism","Constructivism","Suprematism","De Stijl","Precisionism","Art Deco"],by:["Post-Impressionism","African Classical Art Traditions"],cx:[{t:"Analytic Cubism",d:"Phase (1909–12) breaking objects into overlapping geometric facets in muted palette"},{t:"Synthetic Cubism",d:"Phase (1912–) rebuilding images from flat shapes, introducing collage and bright color"},{t:"papier collé",d:"Pasting cut paper onto the canvas, pioneered by Braque — origin of collage in fine art"}],hx:"The early 20th century saw rapid technological change — automobiles, airplanes, cinema, X-rays — which shattered fixed perspectives and encouraged fragmented, simultaneous viewpoints.",geo:{r:"Paris, France",lat:48.86,lng:2.35},tg:["painting","sculpture","drawing","mixed-media"]},
{name:"Futurism",period:"~1909–1944",sort:1909,wiki:w("Futurism"),links:[{l:"Marinetti Manifesto (1909)",u:"https://www.italianfuturism.org/manifestos/foundingmanifesto/"}],origin:"Marinetti glorified speed, technology, violence. Intertwined with fascism.",about:"Dynamic motion, force lines, simultaneity. Extended to sculpture, architecture, music, cuisine.",artists:[{n:"Umberto Boccioni",u:w("Umberto_Boccioni")},{n:"Giacomo Balla",u:w("Giacomo_Balla")},{n:"Carlo Carrà",u:w("Carlo_Carrà")},{n:"Gino Severini",u:w("Gino_Severini")},{n:"Luigi Russolo",u:w("Luigi_Russolo")}],wk:[{t:"Unique Forms of Continuity in Space (Boccioni)",y:1913,m:"bronze"},{t:"Dynamism of a Dog on a Leash (Balla)",y:1912,m:"oil on canvas"}],inf:["Constructivism","Dada","Performance Art","Kinetic Art"],by:["Cubism","Post-Impressionism"],cx:[{t:"simultaneity",d:"Depicting movement and multiple moments in time within a single image"},{t:"force lines",d:"Dynamic lines radiating from objects to convey speed, energy, and motion"}],hx:"Italy was modernizing rapidly and seeking a national identity. Marinetti's 1909 manifesto glorified war as 'the world's only hygiene,' presaging the Futurists' later embrace of fascism.",geo:{r:"Milan, Italy",lat:45.46,lng:9.19},tg:["painting","sculpture","architecture","performance","mixed-media"]},
{name:"Orphism",period:"~1912–1914",sort:1912,wiki:w("Orphism_(art)"),links:[],origin:"Delaunays pushed Cubism toward pure color abstraction.",about:"Circular forms, prismatic color. Bridge between Cubism and pure abstraction.",artists:[{n:"Robert Delaunay",u:w("Robert_Delaunay")},{n:"Sonia Delaunay",u:w("Sonia_Delaunay")},{n:"František Kupka",u:w("František_Kupka")},{n:"Morgan Russell",u:w("Morgan_Russell")}],wk:[{t:"Simultaneous Windows on the City (Robert Delaunay)",y:1912,m:"oil on canvas"},{t:"Amorpha, Fugue in Two Colors (Kupka)",y:1912,m:"oil on canvas"}],inf:["Abstract Expressionism"],by:["Cubism","Post-Impressionism"],cx:[{t:"simultaneity of color",d:"Juxtaposing prismatic colors to create optical vibration and movement"},{t:"Orphism",d:"Named by Apollinaire after Orpheus — art aspiring to the condition of music"}],hx:"Paris in the years just before World War I was a hotbed of artistic experimentation. Apollinaire coined the term 'Orphism' in 1912 to describe this lyrical abstraction.",geo:{r:"Paris, France",lat:48.86,lng:2.35},tg:["painting"]},
{name:"Suprematism",period:"~1913–1930s",sort:1913,wiki:w("Suprematism"),links:[],origin:"Malevich's 'Black Square' (1915). Painting liberated from representation.",about:"Geometric forms on white grounds. 'The supremacy of pure sensation.'",artists:[{n:"Kazimir Malevich",u:w("Kazimir_Malevich")},{n:"Olga Rozanova",u:w("Olga_Rozanova")},{n:"El Lissitzky",u:w("El_Lissitzky")},{n:"Nikolai Suetin",u:w("Nikolai_Suetin")}],wk:[{t:"Black Square (Malevich)",y:1915,m:"oil on linen"},{t:"White on White (Malevich)",y:1918,m:"oil on canvas"}],inf:["Constructivism","De Stijl","Minimalism"],by:["Cubism"],cx:[{t:"non-objective art",d:"Art with no reference to recognizable objects — pure form and color"},{t:"zaum",d:"Russian transrational language — parallel to Suprematism's rejection of representational meaning"}],hx:"The Russian Revolution of 1917 initially embraced avant-garde art. Suprematism emerged alongside revolutionary politics, but Stalin's rise brought Socialist Realism and suppression of abstraction.",geo:{r:"Moscow/St. Petersburg, Russia",lat:59.93,lng:30.32},tg:["painting","design"]},
{name:"Constructivism",period:"~1915–1930s",sort:1915,wiki:w("Constructivism_(art)"),links:[{l:"MoMA — Russian Avant-Garde",u:"https://www.moma.org/collection/terms/russian-avant-garde"}],origin:"Revolutionary Russia. Art must serve the revolution.",about:"Industrial materials, geometric form, utilitarian purpose. Graphic design, typography, architecture.",artists:[{n:"Vladimir Tatlin",u:w("Vladimir_Tatlin")},{n:"Alexander Rodchenko",u:w("Alexander_Rodchenko")},{n:"Varvara Stepanova",u:w("Varvara_Stepanova")},{n:"El Lissitzky",u:w("El_Lissitzky")},{n:"Naum Gabo",u:w("Naum_Gabo")},{n:"Lyubov Popova",u:w("Lyubov_Popova")}],wk:[{t:"Beat the Whites with the Red Wedge (Lissitzky)",y:1920,m:"lithograph"},{t:"Monument to the Third International (Tatlin, model)",y:1920,m:"wood, iron, glass (model)"}],inf:["Bauhaus","De Stijl","Kinetic Art","Minimalism"],by:["Cubism","Futurism","Suprematism"],cx:[{t:"Productivism",d:"Movement within Constructivism insisting art must be useful — design over fine art"},{t:"agitprop",d:"Agitation and propaganda — art deployed for revolutionary political communication"}],hx:"The Russian Revolution (1917) and subsequent Civil War created an urgent context for art serving revolutionary purposes. By the late 1920s, Stalin suppressed the avant-garde.",geo:{r:"Moscow, Russia",lat:55.76,lng:37.62},tg:["sculpture","design","architecture","photography","printmaking"]},
{name:"Dada",period:"~1916–1924",sort:1916,wiki:w("Dada"),links:[{l:"Cabaret Voltaire",u:"https://www.cabaretvoltaire.ch/en"},{l:"MoMA — Dada",u:"https://www.moma.org/collection/terms/dada"}],origin:"Zürich. Born from WWI's absurdity.",about:"Anti-art. Chance, collage, readymades, performance. Every subsequent avant-garde descends from Dada.",artists:[{n:"Marcel Duchamp",u:w("Marcel_Duchamp")},{n:"Hugo Ball",u:w("Hugo_Ball")},{n:"Hannah Höch",u:w("Hannah_Höch")},{n:"Kurt Schwitters",u:w("Kurt_Schwitters")},{n:"Man Ray",u:w("Man_Ray")},{n:"Tristan Tzara",u:w("Tristan_Tzara")},{n:"Jean Arp",u:w("Jean_Arp")},{n:"Francis Picabia",u:w("Francis_Picabia")}],wk:[{t:"Fountain (Duchamp)",y:1917,m:"porcelain urinal (readymade)"},{t:"Cut with the Kitchen Knife (Höch)",y:1919,m:"photomontage"}],inf:["Surrealism","Neo-Dada","Fluxus","Conceptual Art","Pop Art","Performance Art"],by:["Cubism","Futurism"],cx:[{t:"readymade",d:"Ordinary manufactured object designated as art by the artist's choice — Duchamp's invention"},{t:"photomontage",d:"Collage technique using cut and rearranged photographs to create new compositions"},{t:"anti-art",d:"Work that challenges the very definition and institutions of art"}],hx:"World War I killed millions across Europe. Dada emerged in neutral Zurich as a response to the insanity of war, rejecting the rational culture that produced such destruction.",geo:{r:"Zürich, Switzerland / Berlin / New York",lat:47.38,lng:8.54},tg:["mixed-media","performance","photography","printmaking","sculpture"]},
{name:"De Stijl",period:"~1917–1931",sort:1917,wiki:w("De_Stijl"),links:[{l:"Rietveld Schröder House (UNESCO)",u:"https://whc.unesco.org/en/list/965"}],origin:"Mondrian's universal harmony through reduction.",about:"Primary colors + black/white/gray. Horizontal + vertical only. Painting, architecture, furniture.",artists:[{n:"Piet Mondrian",u:w("Piet_Mondrian")},{n:"Theo van Doesburg",u:w("Theo_van_Doesburg")},{n:"Gerrit Rietveld",u:w("Gerrit_Rietveld")},{n:"Bart van der Leck",u:w("Bart_van_der_Leck")}],wk:[{t:"Composition with Red, Blue, and Yellow (Mondrian)",y:1930,m:"oil on canvas"},{t:"Red and Blue Chair (Rietveld)",y:1918,m:"painted wood"}],inf:["Bauhaus","Minimalism","Hard-Edge Painting"],by:["Cubism","Suprematism","Constructivism"],cx:[{t:"Neoplasticism",d:"Mondrian's term for his art of pure relationships between vertical/horizontal lines and primary colors"},{t:"universal harmony",d:"De Stijl's utopian goal of achieving spiritual balance through pure geometric abstraction"}],hx:"The Netherlands remained neutral in WWI. De Stijl sought a universal visual language to transcend nationalist conflict and create harmony through pure abstraction.",geo:{r:"Leiden, Netherlands",lat:52.16,lng:4.49},tg:["painting","architecture","design","sculpture"]},
{name:"Precisionism",period:"~1915–1940s",sort:1918,wiki:w("Precisionism"),links:[],origin:"American response to Cubism/Futurism. Industrial landscape with geometric clarity.",about:"Sharp edges, flat planes, smooth surfaces. Cool, detached American modernism.",artists:[{n:"Charles Sheeler",u:w("Charles_Sheeler")},{n:"Charles Demuth",u:w("Charles_Demuth")},{n:"Georgia O'Keeffe",u:w("Georgia_O'Keeffe")},{n:"Ralston Crawford",u:w("Ralston_Crawford")}],wk:[{t:"I Saw the Figure 5 in Gold (Demuth)",y:1928,m:"oil on cardboard"},{t:"American Landscape (Sheeler)",y:1930,m:"oil on canvas"}],inf:[],by:["Cubism","Futurism"],cx:[{t:"immaculate surface",d:"Smooth, impersonal paint application hiding all traces of the artist's hand"},{t:"machine aesthetic",d:"Celebration of industrial forms — smokestacks, grain elevators, bridges — as subjects for art"}],hx:"The Roaring Twenties in America — rapid industrialization, skyscraper construction, and a booming economy before the 1929 crash.",geo:{r:"New York / Philadelphia, USA",lat:40.71,lng:-74.01},tg:["painting","photography"]},
{name:"Bauhaus",period:"~1919–1933",sort:1919,wiki:w("Bauhaus"),links:[{l:"Bauhaus Dessau",u:"https://www.bauhaus-dessau.de/en/"},{l:"UNESCO — Bauhaus sites",u:"https://whc.unesco.org/en/list/729"}],origin:"Gropius merged art, craft, technology. Nazis shut it; emigrés seeded it globally.",about:"Form follows function. Foundation courses, tubular steel furniture, flat-roofed architecture.",artists:[{n:"Walter Gropius",u:w("Walter_Gropius")},{n:"Mies van der Rohe",u:w("Ludwig_Mies_van_der_Rohe")},{n:"Paul Klee",u:w("Paul_Klee")},{n:"Wassily Kandinsky",u:w("Wassily_Kandinsky")},{n:"László Moholy-Nagy",u:w("László_Moholy-Nagy")},{n:"Josef Albers",u:w("Josef_Albers")},{n:"Anni Albers",u:w("Anni_Albers")},{n:"Marcel Breuer",u:w("Marcel_Breuer")},{n:"Oskar Schlemmer",u:w("Oskar_Schlemmer")}],wk:[{t:"Bauhaus Building, Dessau (Gropius)",y:1926,m:"architecture (steel, glass, concrete)"},{t:"Wassily Chair (Breuer)",y:1925,m:"tubular steel and canvas"}],inf:["Minimalism","De Stijl","Deconstructivism"],by:["Arts and Crafts","Constructivism","De Stijl","Art Nouveau","Vienna Secession"],cx:[{t:"Vorkurs",d:"Bauhaus preliminary course stripping students of prior habits to discover materials and form"},{t:"form follows function",d:"Principle that an object's design should derive from its purpose, not decoration"},{t:"Gesamtkunstwerk",d:"Total artwork unifying architecture, design, and fine art into a coherent whole"}],hx:"Weimar Republic Germany was politically unstable but culturally vibrant. The Bauhaus moved from Weimar to Dessau to Berlin before the Nazis forced its closure in 1933.",geo:{r:"Weimar/Dessau, Germany",lat:51.84,lng:12.24},tg:["architecture","design","painting","photography","textile","sculpture"]},
{name:"Mexican Muralism",period:"~1920s–1960s",sort:1920,wiki:w("Mexican_muralism"),links:[{l:"Palacio de Bellas Artes",u:"https://museopalaciodebellasartes.gob.mx/"}],origin:"Post-revolution: monumental frescoes for a largely illiterate population.",about:"Rivera, Orozco, Siqueiros: history, labor, indigenous identity on public buildings.",artists:[{n:"Diego Rivera",u:w("Diego_Rivera")},{n:"David Alfaro Siqueiros",u:w("David_Alfaro_Siqueiros")},{n:"José Clemente Orozco",u:w("José_Clemente_Orozco")},{n:"Ben Shahn",u:w("Ben_Shahn")}],wk:[{t:"Man at the Crossroads (Rivera, destroyed/recreated)",y:1934,m:"fresco"},{t:"The Epic of American Civilization (Orozco)",y:1934,m:"fresco"}],inf:["Street Art / Graffiti","Social Practice Art"],by:["Mesoamerican Art","Realism"],cx:[{t:"muralismo",d:"Art on public walls serving revolutionary education and national identity formation"},{t:"social realism",d:"Art depicting the lives and struggles of working people as political expression"}],hx:"The Mexican Revolution (1910–1920) created a new government that commissioned public murals to educate the largely illiterate population about Mexican history and revolutionary ideals.",geo:{r:"Mexico City, Mexico",lat:19.43,lng:-99.13},tg:["painting","fresco"]},
{name:"Harlem Renaissance",period:"~1920s–1930s",sort:1922,wiki:w("Harlem_Renaissance"),links:[{l:"Smithsonian NMAAHC",u:"https://nmaahc.si.edu/explore/stories/new-african-american-identity-harlem-renaissance"}],origin:"African American cultural explosion in Harlem. Alain Locke's 'The New Negro' (1925).",about:"Aaron Douglas's silhouettes, Archibald Motley's nightlife, Augusta Savage's sculpture. Art as racial pride.",artists:[{n:"Aaron Douglas",u:w("Aaron_Douglas")},{n:"Archibald Motley Jr.",u:w("Archibald_Motley")},{n:"Augusta Savage",u:w("Augusta_Savage")},{n:"Jacob Lawrence",u:w("Jacob_Lawrence")},{n:"Lois Mailou Jones",u:w("Lois_Mailou_Jones")}],wk:[{t:"Aspects of Negro Life (Aaron Douglas)",y:1934,m:"oil on canvas (mural)"},{t:"The Migration Series (Jacob Lawrence)",y:1941,m:"tempera on hardboard"}],inf:["Afrofuturism"],by:["African Classical Art Traditions"],cx:[{t:"The New Negro",d:"Alain Locke's 1925 anthology that defined the movement's cultural and intellectual identity"},{t:"racial uplift",d:"Using art and culture to challenge stereotypes and demonstrate African American achievement"}],hx:"The Great Migration brought millions of African Americans from the rural South to northern cities. Jazz, literature, and visual arts flourished in Harlem during the 1920s.",geo:{r:"Harlem, New York, USA",lat:40.81,lng:-73.95},tg:["painting","sculpture","printmaking"]},

{name:"Art Brut / Outsider Art",period:"~1945–present",sort:1945,wiki:w("Outsider_art"),links:[{l:"Collection de l'Art Brut, Lausanne",u:"https://www.artbrut.ch/en"}],origin:"Dubuffet coined 'Art Brut' (1945). Art by psychiatric patients, self-taught makers.",about:"Unfiltered, obsessive, visionary. Challenges every institutional definition of art.",artists:[{n:"Jean Dubuffet",u:w("Jean_Dubuffet")},{n:"Adolf Wölfli",u:w("Adolf_Wölfli")},{n:"Henry Darger",u:w("Henry_Darger")},{n:"Martín Ramírez",u:w("Martín_Ramírez")},{n:"Bill Traylor",u:w("Bill_Traylor")}],wk:[{t:"In the Realms of the Unreal (Darger)",y:1950,m:"watercolor, pencil, collage on paper"},{t:"The Outsider (Wölfli)",y:1921,m:"pencil and colored crayon on paper"}],inf:[],by:[],cx:[{t:"Art Brut",d:"'Raw art' — Dubuffet's term for art created outside the mainstream art world and academic tradition"},{t:"horror vacui",d:"Compulsive filling of every space, common in outsider art"}],hx:"The horrors of WWII and the Holocaust prompted fundamental questions about civilization and rationality. Dubuffet sought authentic creativity untouched by cultural conditioning.",geo:{r:"Lausanne, Switzerland / Various",lat:46.52,lng:6.63},tg:["painting","drawing","mixed-media","sculpture"]},

{name:"Neo-Dada",period:"~1950s–1960s",sort:1953,wiki:w("Neo-Dada"),links:[],origin:"Johns and Rauschenberg challenged AbEx heroic subjectivity.",about:"Combines, flags, targets, assemblage. Bridged AbEx and Pop.",artists:[{n:"Robert Rauschenberg",u:w("Robert_Rauschenberg")},{n:"Jasper Johns",u:w("Jasper_Johns")},{n:"Jean Tinguely",u:w("Jean_Tinguely")},{n:"Niki de Saint Phalle",u:w("Niki_de_Saint_Phalle")}],wk:[{t:"Flag (Johns)",y:1955,m:"encaustic, oil, collage on fabric"},{t:"Monogram (Rauschenberg)",y:1959,m:"oil, paper, fabric, stuffed goat, tire"}],inf:["Pop Art","Fluxus","Conceptual Art"],by:["Dada","Abstract Expressionism"],cx:[{t:"combine",d:"Rauschenberg's term for works combining painting and sculpture with found objects"},{t:"assemblage",d:"Art made from found objects and materials assembled together"}],hx:"The 1950s consumer boom in America produced a flood of commercial images and objects that artists began incorporating into their work, breaking down the boundary between art and life.",geo:{r:"New York City, USA",lat:40.71,lng:-74.01},tg:["painting","sculpture","mixed-media"]},
{name:"Pop Art",period:"~1955–1970s",sort:1955,wiki:w("Pop_art"),links:[{l:"The Andy Warhol Museum",u:"https://www.warhol.org/"},{l:"Tate — Pop Art",u:"https://www.tate.org.uk/art/art-terms/p/pop-art"}],origin:"Britain and America independently. Mass media as fine art subject.",about:"Silkscreen, Ben-Day dots, comic imagery, celebrity faces. Demolished high/low divide.",artists:[{n:"Andy Warhol",u:w("Andy_Warhol")},{n:"Roy Lichtenstein",u:w("Roy_Lichtenstein")},{n:"Claes Oldenburg",u:w("Claes_Oldenburg")},{n:"James Rosenquist",u:w("James_Rosenquist")},{n:"Richard Hamilton",u:w("Richard_Hamilton_(artist)")},{n:"David Hockney",u:w("David_Hockney")},{n:"Ed Ruscha",u:w("Ed_Ruscha")},{n:"Yayoi Kusama",u:w("Yayoi_Kusama")}],wk:[{t:"Campbell's Soup Cans (Warhol)",y:1962,m:"synthetic polymer on canvas"},{t:"Whaam! (Lichtenstein)",y:1963,m:"oil and Magna on canvas"}],inf:["Postmodernism","Street Art / Graffiti","Superflat","Lowbrow / Pop Surrealism","Neo-Expressionism"],by:["Dada","Neo-Dada","Abstract Expressionism"],cx:[{t:"appropriation",d:"Using pre-existing images or objects in new art, blurring authorship and originality"},{t:"Ben-Day dots",d:"Printing technique of colored dots Lichtenstein hand-painted to mimic commercial reproduction"},{t:"serial production",d:"Warhol's factory method of repeating images, questioning uniqueness and authorship"}],hx:"The 1960s: Kennedy, Vietnam, the space race, consumer culture, television in every home. Pop Art reflected and critiqued this media-saturated world.",geo:{r:"New York / London",lat:40.71,lng:-74.01},tg:["painting","sculpture","printmaking","mixed-media"]},
{name:"Situationist International",period:"~1957–1972",sort:1957,wiki:w("Situationist_International"),links:[{l:"Society of the Spectacle",u:"https://www.marxists.org/reference/archive/debord/society.htm"}],origin:"Guy Debord. Marxist critique of consumer spectacle.",about:"Détournement, dérive, psychogeography. Influenced May '68, punk, culture jamming.",artists:[{n:"Guy Debord",u:w("Guy_Debord")},{n:"Asger Jorn",u:w("Asger_Jorn")},{n:"Constant Nieuwenhuys",u:w("Constant_Nieuwenhuys")},{n:"Raoul Vaneigem",u:w("Raoul_Vaneigem")}],wk:[{t:"The Naked City (Debord)",y:1957,m:"ink on paper (psychogeographic map)"},{t:"Mémoires (Debord/Jorn)",y:1959,m:"book with sandpaper cover"}],inf:["Street Art / Graffiti","Postmodernism"],by:["CoBrA","Dada"],cx:[{t:"détournement",d:"Hijacking existing cultural material and repurposing it to subvert its original meaning"},{t:"dérive",d:"'Drift' — unplanned journey through urban environments guided by psychogeographic attraction"},{t:"spectacle",d:"Debord's concept of modern life as a mediated performance replacing authentic experience"}],hx:"The Cold War, consumerism, and growing disillusionment with both capitalism and Soviet communism. The Situationists directly influenced the May 1968 protests in Paris.",geo:{r:"Paris, France",lat:48.86,lng:2.35},tg:["mixed-media","performance","film"]},
{name:"Op Art",period:"~1960s",sort:1960,wiki:w("Op_art"),links:[],origin:"Perceptual phenomena. 'The Responsive Eye' at MoMA (1965).",about:"Geometric patterns creating illusions of movement and vibration.",artists:[{n:"Victor Vasarely",u:w("Victor_Vasarely")},{n:"Bridget Riley",u:w("Bridget_Riley")},{n:"Jesús Rafael Soto",u:w("Jesús_Rafael_Soto")},{n:"Carlos Cruz-Diez",u:w("Carlos_Cruz-Diez")}],wk:[{t:"Movement in Squares (Riley)",y:1961,m:"tempera on hardboard"},{t:"Zebra (Vasarely)",y:1937,m:"screen print"}],inf:[],by:["Constructivism","De Stijl"],cx:[{t:"optical vibration",d:"Visual effect where geometric patterns appear to pulse or shimmer due to retinal interaction"},{t:"moiré pattern",d:"Interference pattern created by overlapping geometric grids"}],hx:"The space age and developments in perceptual psychology influenced artists exploring how the eye processes visual information. MoMA's 1965 'Responsive Eye' show brought Op Art to mainstream attention.",geo:{r:"Paris / London",lat:48.86,lng:2.35},tg:["painting","printmaking","sculpture"]},
{name:"Kinetic Art",period:"~1950s–1970s",sort:1956,wiki:w("Kinetic_art"),links:[],origin:"From Constructivism and Calder's mobiles.",about:"Sculpture that moves. Light installations. Viewer interaction.",artists:[{n:"Alexander Calder",u:w("Alexander_Calder")},{n:"Jean Tinguely",u:w("Jean_Tinguely")},{n:"Julio Le Parc",u:w("Julio_Le_Parc")},{n:"Yaacov Agam",u:w("Yaacov_Agam")}],wk:[{t:"Lobster Trap and Fish Tail (Calder)",y:1939,m:"painted steel wire and sheet aluminum"},{t:"Homage to New York (Tinguely)",y:1960,m:"self-destroying machine sculpture"}],inf:["Installation Art"],by:["Constructivism","Futurism"],cx:[{t:"mobile",d:"Calder's invention — suspended sculpture that moves with air currents"},{t:"kinetic energy",d:"Physical movement incorporated as an essential element of the artwork"}],hx:"The space race and technological optimism of the 1950s–60s inspired artists to incorporate actual movement and mechanical engineering into their sculptural practice.",geo:{r:"Paris / New York",lat:48.86,lng:2.35},tg:["sculpture","installation","mixed-media"]},
{name:"Hard-Edge Painting",period:"~1959–1970s",sort:1959,wiki:w("Hard-edge_painting"),links:[],origin:"Reaction against AbEx gestural excess.",about:"Crisp boundaries, flat surfaces, geometric precision.",artists:[{n:"Ellsworth Kelly",u:w("Ellsworth_Kelly")},{n:"Frank Stella",u:w("Frank_Stella")},{n:"Carmen Herrera",u:w("Carmen_Herrera")}],wk:[{t:"Die Fahne Hoch! (Stella)",y:1959,m:"enamel on canvas"},{t:"Green and Orange (Kelly)",y:1964,m:"oil on canvas"}],inf:["Minimalism"],by:["Abstract Expressionism","De Stijl","Color Field Painting"],cx:[{t:"hard edge",d:"Sharply defined, clean boundaries between color areas with no blending or visible brushwork"},{t:"shaped canvas",d:"Stella's non-rectangular canvases where the painting's shape is part of the composition"}],hx:"The late 1950s saw a reaction against the emotional intensity of Abstract Expressionism, leading toward cooler, more systematic approaches to abstraction.",geo:{r:"New York / Los Angeles, USA",lat:40.71,lng:-74.01},tg:["painting"]},

{name:"Nouveau Réalisme",period:"~1960–1970",sort:1960,wiki:w("Nouveau_réalisme"),links:[],origin:"Paris. European answer to Pop.",about:"Accumulations, compressed cars, décollage, fire paintings.",artists:[{n:"Yves Klein",u:w("Yves_Klein")},{n:"Arman",u:w("Arman")},{n:"Niki de Saint Phalle",u:w("Niki_de_Saint_Phalle")},{n:"Jean Tinguely",u:w("Jean_Tinguely")},{n:"Daniel Spoerri",u:w("Daniel_Spoerri")},{n:"Christo",u:w("Christo")}],wk:[{t:"IKB 79 (International Klein Blue) (Klein)",y:1959,m:"pigment in synthetic resin on canvas"},{t:"Nana sculptures (Saint Phalle)",y:1966,m:"polyester, paint"}],inf:["Installation Art"],by:["Dada","Pop Art"],cx:[{t:"décollage",d:"Tearing away layers of posters to reveal fragmented images beneath"},{t:"accumulation",d:"Arman's technique of collecting and displaying masses of identical found objects"}],hx:"Postwar France was rebuilding its cultural identity. Pierre Restany's 1960 manifesto declared a 'new approach to perceiving the real' through the poetics of everyday objects.",geo:{r:"Paris, France",lat:48.86,lng:2.35},tg:["sculpture","installation","mixed-media","performance","painting"]},
